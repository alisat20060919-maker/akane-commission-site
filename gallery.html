<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>塔羅占卜｜茜子的委託小屋</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#04050f;color:#fff6df;font-family:Georgia,'Times New Roman',serif}.phone{max-width:430px;margin:auto;min-height:100vh;background:radial-gradient(circle at 50% 28%,#35234e,#080917 72%);border-left:1px solid #6f5427;border-right:1px solid #6f5427;position:relative;overflow:hidden}.phone:before{content:"";position:absolute;inset:8px;border:1px solid #9d7835;border-radius:28px;pointer-events:none}.top{position:absolute;z-index:5;left:22px;right:22px;top:18px;display:flex;justify-content:space-between}.round{width:42px;height:42px;border:1px solid #c99b49;border-radius:50%;background:#070817cc;color:#ecca83;display:grid;place-items:center;text-decoration:none;font-weight:900}.title{padding-top:72px;text-align:center;position:relative;z-index:2}.title h1{font-size:42px;line-height:.95;margin:0;color:#f2c879;letter-spacing:.05em}.title p{margin:10px 0 0;color:#eee2c2;letter-spacing:.23em;font-size:12px}.scene{position:relative;height:640px;margin-top:2px}.reader{position:absolute;left:50%;top:64px;width:240px;height:250px;margin-left:-120px}.hair{position:absolute;left:35px;top:0;width:170px;height:190px;background:radial-gradient(circle at 50% 20%,#2b1830,#0a0710 70%);border-radius:48% 48% 44% 44%;box-shadow:0 0 35px #000}.face{position:absolute;left:74px;top:38px;width:92px;height:112px;background:linear-gradient(#b17962,#6c3b34);border-radius:48% 48% 45% 45%;box-shadow:0 0 25px #0008}.face:before{content:"✦";position:absolute;left:38px;top:16px;color:#a76cff;text-shadow:0 0 12px #b67cff}.robe{position:absolute;left:12px;right:12px;top:145px;height:105px;background:linear-gradient(120deg,#20122e,#4c2565,#130d20);border:1px solid #9d7835;border-radius:90px 90px 20px 20px;box-shadow:inset 0 0 25px #c4923522}.hand{position:absolute;top:222px;width:62px;height:24px;background:#9b6450;border-radius:30px;box-shadow:0 0 16px #0009}.hand.l{left:8px;transform:rotate(9deg)}.hand.r{right:8px;transform:rotate(-9deg)}.panel{position:absolute;top:128px;width:92px;min-height:118px;border:1px solid #b8893f;border-radius:10px;background:#080918d9;color:#f3d48d;padding:12px 8px;text-align:center;z-index:3}.panel b{display:block;font-size:13px;line-height:1.2;margin:8px 0}.panel small{color:#cfa8ff}.panel.l{left:24px}.panel.r{right:24px}.crystal{position:absolute;left:50%;top:308px;width:92px;height:92px;margin-left:-46px;border-radius:50%;background:radial-gradient(circle at 45% 42%,#fff,#bd79ff 13%,#6332d6 38%,#18246c 68%,#d7b7ff 100%);box-shadow:0 0 30px #a85cff,0 0 80px #8b4cffaa;z-index:5}.crystal:after{content:"";position:absolute;left:23px;right:23px;bottom:-14px;height:22px;border-radius:50%;background:linear-gradient(#d8aa55,#6f421c);box-shadow:0 10px 22px #000}.table{position:absolute;left:15px;right:15px;top:355px;height:245px;border-radius:50% 50% 0 0;background:radial-gradient(circle at 50% 10%,#3a2452,#120b20 70%);border-top:1px solid #8d6a32}.fan{position:absolute;left:0;right:0;top:378px;height:190px;z-index:4;pointer-events:none}.card{width:64px;height:110px;border:1.5px solid #d2a556;border-radius:8px;background:linear-gradient(#111a3a,#090b1d);position:absolute;left:50%;top:28px;margin-left:-32px;transform-origin:50% -65%;display:grid;place-items:center;color:#e8c778;box-shadow:0 12px 20px #000a;pointer-events:auto;cursor:pointer;transition:.28s}.card:before{content:"";position:absolute;inset:7px;border:1px solid #c49a54;border-radius:6px}.card span{position:relative}.card:hover,.card.pick{filter:brightness(1.25);transform:var(--t) translateY(12px)!important}.fan.ready .card{animation:fanOpen .65s both;animation-delay:var(--d)}@keyframes fanOpen{from{opacity:0;transform:rotate(0) translateY(-70px) scale(.7)}to{opacity:1;transform:var(--t)}}.msg{position:absolute;left:34px;right:34px;top:545px;border:1px solid #b8893f;border-radius:18px;background:#070817d9;padding:14px;text-align:center;z-index:6}.msg h2{margin:0;color:#f0c979;letter-spacing:.08em}.msg p{margin:7px 0 0;color:#ddd3bd;font-size:13px}.btn{position:absolute;left:70px;right:70px;top:638px;border:1px solid #d7a956;border-radius:22px;background:linear-gradient(#7832a8,#2b1644);box-shadow:0 0 26px #a245ff;color:#ffe7ad;padding:14px;text-align:center;font-weight:900;z-index:6;cursor:pointer}.nav{height:92px;margin:100px 16px 16px;border:1px solid #8b6835;border-radius:28px;background:#060817e8;display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden}.nav div{display:grid;place-items:center;text-align:center;color:#dec28a;font-size:11px;border-left:1px solid #3b2a20}.nav div:first-child{border-left:0;background:linear-gradient(#24113d,#130821);box-shadow:inset 0 -4px 18px #9d3dff}.result{margin:0 18px 20px;border:1px solid #a77d3a;border-radius:20px;background:#080918dd;padding:14px;line-height:1.7;display:none}.gold{color:#f2c879}.flipArea{position:absolute;left:18px;right:18px;top:610px;display:flex;gap:10px;justify-content:center;z-index:7;flex-wrap:wrap}.pickCard{width:92px;height:142px;border:2px solid #caa052;border-radius:12px;background:linear-gradient(#111735,#050716);display:grid;place-items:center;text-align:center;padding:8px;box-shadow:0 12px 22px #000a;cursor:pointer}.pickCard small{color:#d9cda9}.hidden{display:none}@media(max-width:380px){.title h1{font-size:36px}.panel{width:80px}.card{width:56px;height:96px;margin-left:-28px}.btn{left:52px;right:52px}}</style></head><body><main class="phone"><div class="top"><a class="round" href="index.html">☰</a><a class="round" href="hall.html?v=39000">✦</a></div><section class="title"><h1>TAROT READING</h1><p>DISCOVER YOUR PATH</p></section><section class="scene"><div class="panel l">☾<b>YOUR<br>ENERGY</b><small id="moodText">High</small></div><div class="panel r">✦<b>TODAY'S<br>GUIDANCE</b><small id="spreadText">3 Cards</small></div><div class="reader"><div class="hair"></div><div class="face"></div><div class="robe"></div><div class="hand l"></div><div class="hand r"></div></div><div class="crystal"></div><div class="table"></div><div class="fan" id="fan"></div><div class="msg"><h2 id="mainTitle">CHOOSE YOUR CARD</h2><p id="hint">牌師會攤開牌，請選擇呼喚你的牌。</p></div><button class="btn" id="ready">I'M READY</button><div class="flipArea hidden" id="flipArea"></div></section><div class="nav"><div>▰<br>READING</div><div>▱<br>SPREADS</div><div>☾<br>DAILY</div><div>○<br>PROFILE</div></div><section class="result" id="result"></section></main><script>const majors='愚者,魔術師,女祭司,皇后,皇帝,教皇,戀人,戰車,力量,隱者,命運之輪,正義,懸者,轉化,節制,影子,塔,星星,月亮,太陽,審判,世界'.split(','),mrec='QQ,服裝角色,插圖,亮晶晶,色塊,委託規則,色塊,QQ,QQ,服裝角色,插圖,色塊,插圖,服裝角色,亮晶晶,插圖,插圖,亮晶晶,插圖,QQ,服裝角色,色塊'.split(',');const suits=[['權杖','✦','插圖'],['聖杯','☾','亮晶晶'],['寶劍','◇','色塊'],['錢幣','◎','服裝角色']],ranks='A,二,三,四,五,六,七,八,九,十,侍者,騎士,皇后,國王'.split(',');const deck=[...majors.map((n,i)=>({no:i,name:n,kind:'大阿爾克那',sig:'✦',rec:mrec[i]})),...suits.flatMap((s,si)=>ranks.map((r,ri)=>({no:22+si*14+ri,name:s[0]+r,kind:'小阿爾克那',sig:s[1],rec:s[2]})))];let picked=[],need=3;function start(){picked=[];result.style.display='none';flipArea.classList.add('hidden');flipArea.innerHTML='';ready.textContent='SHUFFLING...';mainTitle.textContent='TAROT READING';hint.textContent='牌師正在洗牌，水晶球正在發光。';fan.classList.remove('ready');fan.innerHTML='';setTimeout(()=>{let cards=[...deck].sort(()=>Math.random()-.5).slice(0,13).map(c=>({...c,rev:Math.random()<.3}));fan.innerHTML=cards.map((c,i)=>{let r=-48+i*8,y=Math.abs(i-6)*5;return '<div class="card" data-i="'+i+'" style="--t:rotate('+r+'deg) translateY('+y+'px);--d:'+(i*.035)+'s"><span>☾</span></div>'}).join('');fan.classList.add('ready');window.cards=cards;ready.textContent='選擇牌背';mainTitle.textContent='CHOOSE YOUR CARD';hint.textContent='牌師已攤開倒扇形牌陣，請選 '+need+' 張。';document.querySelectorAll('.card').forEach(el=>el.onclick=()=>choose(+el.dataset.i,el))},780)}function choose(i,el){if(picked.length>=need||el.classList.contains('pick'))return;el.classList.add('pick');picked.push(window.cards[i]);hint.textContent='已選 '+picked.length+' / '+need;if(picked.length>=need)setTimeout(showFlip,420)}function showFlip(){flipArea.classList.remove('hidden');flipArea.innerHTML=picked.map((c,i)=>'<div class="pickCard" data-i="'+i+'"><div><div class="gold">'+String(c.no+1).padStart(2,'0')+' / 78</div><h3>☾</h3><small>點擊翻牌</small></div></div>').join('');hint.textContent='選好了，請翻開你的牌。';document.querySelectorAll('.pickCard').forEach(el=>el.onclick=()=>flip(+el.dataset.i,el))}function flip(i,el){let c=picked[i];if(c.open)return;c.open=1;el.innerHTML='<div><div class="gold">'+String(c.no+1).padStart(2,'0')+' / 78</div><h3>'+c.name+(c.rev?' 逆位':' 正位')+'</h3><small>'+c.kind+'</small></div>';if(picked.every(x=>x.open))finish()}function finish(){let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};picked.forEach(c=>score[c.rec]+=c.rev?1:2);let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);result.style.display='block';result.innerHTML='<h2 class="gold">READING RESULT</h2>'+picked.map(c=>'【'+c.name+(c.rev?'逆位':'正位')+'】'+(c.rev?'先收斂需求，讓方向更明確。':'適合往「'+c.rec+'」方向嘗試。')).join('<br>')+'<h2 class="gold">適合委託</h2>'+rec.join('・')}ready.onclick=start;</script></body></html>
