<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星月抽牌室</title><style>body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#35204f,#070818 70%);color:#fff6df;font-family:serif}.wrap{max-width:980px;margin:auto;padding:16px}a,button,select{font:inherit}.top{display:flex;justify-content:space-between;gap:8px}.top a,.chip{border:1px solid #c8a95d;border-radius:18px;background:#080818;color:#fff6df;padding:10px 12px;text-decoration:none;font-weight:800}.hero,.box{border:1px solid #c8a95d;border-radius:24px;background:#09091bcc;padding:16px;margin-top:14px;text-align:center}.hero{border-width:2px;background:linear-gradient(#2d1c44,#09091b)}h1{margin:0;color:#fff0b4}.field{display:grid;gap:9px}.field select{width:100%;border:1px solid #8e7447;border-radius:15px;background:#050716;color:#fff6df;padding:12px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip.on,.gold,.draw{background:#efd98d!important;color:#151021!important}.draw{width:100%;border:0;border-radius:18px;padding:14px;font-weight:900}.deck{height:135px;display:grid;place-items:center;position:relative}.deckCard{width:84px;height:128px;border:2px solid #c8a95d;border-radius:14px;background:linear-gradient(#111735,#050716);box-shadow:0 12px 20px #0009;position:absolute;display:grid;place-items:center;color:#ffe7a3}.deckCard:nth-child(1){transform:rotate(-7deg) translateX(-10px)}.deckCard:nth-child(2){transform:rotate(5deg) translateX(8px)}.deckCard:nth-child(3){transform:rotate(0)}.shuffling .deckCard:nth-child(1){animation:shuffleA .75s ease-in-out}.shuffling .deckCard:nth-child(2){animation:shuffleB .75s ease-in-out}.shuffling .deckCard:nth-child(3){animation:shuffleC .75s ease-in-out}@keyframes shuffleA{40%{transform:translateX(-85px) rotate(-18deg)}80%{transform:translateX(30px) rotate(9deg)}}@keyframes shuffleB{40%{transform:translateX(80px) rotate(18deg)}80%{transform:translateX(-25px) rotate(-7deg)}}@keyframes shuffleC{50%{transform:translateY(-16px) rotate(4deg)}}.fanBox{display:none}.fan{height:285px;position:relative;perspective:900px;overflow:hidden}.fanCard{width:92px;height:146px;border:2px solid #c8a95d;border-radius:14px;background:linear-gradient(#111735,#050716);position:absolute;left:50%;bottom:26px;margin-left:-46px;display:grid;place-items:center;color:#ffe7a3;box-shadow:0 15px 24px #0009;cursor:pointer;transform-origin:50% 125%;transform:rotate(var(--r)) translateY(var(--y));animation:fanOpen .55s both;animation-delay:var(--d)}.fanCard:before,.card:before{content:"";position:absolute;inset:9px;border:1px solid #d7b66c99;border-radius:11px}.fanCard span{position:relative}.fanCard:hover{filter:brightness(1.18);z-index:5}.fanCard.chosen{animation:pick .38s both;pointer-events:none}@keyframes fanOpen{from{opacity:0;transform:rotate(0) translateY(120px) scale(.75)}to{opacity:1;transform:rotate(var(--r)) translateY(var(--y)) scale(1)}}@keyframes pick{to{opacity:0;transform:translateY(-90px) scale(.6)}}.spread{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.slot{display:grid;justify-items:center;gap:8px;animation:deal .45s both}.label{color:#ffe6a3;font-weight:900}.card{width:150px;height:235px;border:2px solid #c8a95d;border-radius:18px;background:linear-gradient(#111735,#050716);display:grid;place-items:center;text-align:center;padding:12px;position:relative;box-shadow:0 16px 30px #0009;cursor:pointer;transition:transform .55s ease,filter .35s}.slot .card{animation:land .5s both}.card:hover{filter:brightness(1.12)}.back .front{display:none}.back .backface{display:block}.front{display:block}.backface{display:none}.moon{font-size:48px;color:#ffe7a3}.sig{font-size:34px;color:#ffe7a3}.no{font-size:12px;color:#f4d887}.open{animation:flip .65s ease both}.rev{transform:rotate(180deg)}.rev>*{transform:rotate(180deg)}@keyframes deal{from{opacity:0;transform:translateY(-50px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes land{0%{transform:rotate(-8deg)}100%{transform:rotate(0)}}@keyframes flip{0%{transform:rotateY(0) scale(1)}45%{transform:rotateY(90deg) scale(1.04)}100%{transform:rotateY(0) scale(1)}}.rec{display:grid;grid-template-columns:1fr 1fr;gap:10px}.rec a{border:1px solid #c8a95d;border-radius:18px;padding:12px;text-decoration:none;text-align:center;color:#151021;font-weight:900}@media(max-width:680px){.spread,.rec{grid-template-columns:1fr}.top a{font-size:13px}.fan{height:250px}.fanCard{width:72px;height:116px;margin-left:-36px}}</style></head><body><div class="wrap"><div class="top"><a href="index.html">✦ 回首頁</a><a href="hall.html?v=39000">塔羅畫廊</a><a href="rules.html">委託規則</a></div><section class="hero"><h1>星月抽牌室</h1><p id="count">完整 78 張牌庫｜倒扇形選牌版 v8</p><p>不用輸入問題。先洗牌，牌會展開成倒扇形，請照直覺選牌。</p></section><section class="box field"><select id="spread"><option value="1">單張牌：今日指引</option><option value="3">三張牌：現在・阻礙・建議</option><option value="5">五張牌：現況・內心・阻礙・可能・建議</option></select><div class="chips"><button class="chip on" data-m="迷惘">迷惘</button><button class="chip" data-m="想可愛">想可愛</button><button class="chip" data-m="想華麗">想華麗</button><button class="chip" data-m="整理設定">整理設定</button><button class="chip" data-m="想驚喜">想驚喜</button></div><button class="draw" id="shuffle">洗牌 ✦</button><div class="deck" id="deckArea"><div class="deckCard">☾</div><div class="deckCard">✦</div><div class="deckCard">☾</div></div></section><section class="box fanBox" id="fanBox"><h2 id="fanTitle">請選牌</h2><p id="fanHint">從倒扇形牌陣中選牌。</p><div class="fan" id="fan"></div></section><section class="box" id="table" style="display:none"><h2 id="title">請翻牌</h2><p id="hint">點擊牌背翻牌。</p><div class="spread" id="cards"></div></section><section id="result"></section></div><script>const majors='愚者,魔術師,女祭司,皇后,皇帝,教皇,戀人,戰車,力量,隱者,命運之輪,正義,懸者,轉化,節制,影子,塔,星星,月亮,太陽,審判,世界'.split(','),mrec='QQ,服裝角色,插圖,亮晶晶,色塊,委託規則,色塊,QQ,QQ,服裝角色,插圖,色塊,插圖,服裝角色,亮晶晶,插圖,插圖,亮晶晶,插圖,QQ,服裝角色,色塊'.split(',');const suits=[['權杖','✦','插圖'],['聖杯','☾','亮晶晶'],['寶劍','◇','色塊'],['錢幣','◎','服裝角色']],ranks='A,二,三,四,五,六,七,八,九,十,侍者,騎士,皇后,國王'.split(',');const deck=[...majors.map((n,i)=>({no:i,name:n,kind:'大阿爾克那',sig:'✦',rec:mrec[i]})),...suits.flatMap((s,si)=>ranks.map((r,ri)=>({no:22+si*14+ri,name:s[0]+r,kind:'小阿爾克那',sig:s[1],rec:s[2]})))];count.textContent='完整 '+deck.length+' 張牌庫｜倒扇形選牌版 v8';let mood='迷惘',fanDeck=[],picked=[],need=1;document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');mood=b.dataset.m});function labs(n){return n==5?['現況','內心','阻礙','可能','建議']:n==3?['現在','阻礙','建議']:['今日指引']}function start(){need=+spread.value;shuffle.textContent='洗牌中…';deckArea.classList.add('shuffling');fanBox.style.display='none';table.style.display='none';result.innerHTML='';setTimeout(()=>{fanDeck=[...deck].sort(()=>Math.random()-.5).slice(0,12).map(c=>({...c,rev:Math.random()<.3,open:false,chosen:false}));picked=[];renderFan();deckArea.classList.remove('shuffling');shuffle.textContent='重新洗牌 ✦';fanBox.style.display='block';fanBox.scrollIntoView({behavior:'smooth'})},850)}function renderFan(){fanTitle.textContent='請選 '+need+' 張牌';fanHint.textContent='已選 '+picked.length+' / '+need+'。從倒扇形牌陣中點選。';fan.innerHTML=fanDeck.map((c,i)=>{let r=-44+i*8,y=Math.abs(i-5.5)*8;return '<div class="fanCard '+(c.chosen?'chosen':'')+'" data-i="'+i+'" style="--r:'+r+'deg;--y:'+y+'px;--d:'+(i*.04)+'s"><span>☾</span></div>'}).join('');document.querySelectorAll('.fanCard').forEach(el=>el.onclick=()=>choose(+el.dataset.i,el))}function choose(i,el){if(fanDeck[i].chosen||picked.length>=need)return;fanDeck[i].chosen=true;picked.push(fanDeck[i]);el.classList.add('chosen');fanHint.textContent='已選 '+picked.length+' / '+need+'。';if(picked.length>=need)setTimeout(showPicked,450)}function showPicked(){let l=labs(need);fanHint.textContent='牌已選好，請往下翻牌。';table.style.display='block';title.textContent='請翻牌｜'+l.join('・');hint.textContent='點擊牌背翻牌。';cards.innerHTML=picked.map((c,i)=>'<div class="slot" style="animation-delay:'+(i*.12)+'s"><div class="label">'+l[i]+'</div><div class="card back" data-i="'+i+'"><div class="backface"><div class="no">AKANE TAROT</div><div class="moon">☾</div><small>點擊翻牌</small></div><div class="front"><div class="no">'+String(c.no+1).padStart(2,'0')+' / 78</div><div class="sig">'+c.sig+'</div><h3>'+c.name+(c.rev?' 逆位':' 正位')+'</h3><small>'+c.kind+'</small></div></div></div>').join('');document.querySelectorAll('.card').forEach(c=>c.onclick=()=>flip(+c.dataset.i,c));table.scrollIntoView({behavior:'smooth'})}function flip(i,el){if(picked[i].open)return;picked[i].open=true;el.classList.add('open');setTimeout(()=>{el.classList.remove('back');if(picked[i].rev)el.classList.add('rev')},280);if(picked.every(c=>c.open))setTimeout(finish,720)}function finish(){hint.textContent='牌已翻開。';let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};picked.forEach(c=>score[c.rec]+=c.rev?1:2);if(mood=='想可愛')score.QQ+=2;if(mood=='想華麗'){score.亮晶晶+=2;score.插圖+=1}if(mood=='整理設定')score.服裝角色+=2;if(mood=='想驚喜')score.插圖+=2;let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);result.innerHTML='<section class="box"><h2>解讀</h2>'+picked.map(c=>'【'+c.name+(c.rev?'逆位':'正位')+'】'+(c.rev?'先收斂需求，讓方向更明確。':'適合往「'+c.rec+'」方向嘗試。')).join('<br>')+'<br><br><b>目前狀態</b>：'+mood+'<h2>適合委託</h2><div class="rec">'+rec.map(k=>'<a class="gold" href="'+(k=='委託規則'?'rules.html':'hall.html?v=39000')+'">'+k+'</a>').join('')+'</div></section>'}shuffle.onclick=start;</script></body></html>
