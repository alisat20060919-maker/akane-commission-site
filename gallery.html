<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星月抽牌室</title><style>body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#35204f,#070818 70%);color:#fff6df;font-family:serif}.wrap{max-width:900px;margin:auto;padding:16px}a,button,select,input{font:inherit}.top{display:flex;justify-content:space-between;gap:8px}.top a,.chip{border:1px solid #c8a95d;border-radius:18px;background:#080818;color:#fff6df;padding:10px 12px;text-decoration:none;font-weight:800}.hero,.box{border:1px solid #c8a95d;border-radius:24px;background:#09091bcc;padding:16px;margin-top:14px;text-align:center}.hero{border-width:2px;background:linear-gradient(#2d1c44,#09091b)}h1{margin:0;color:#fff0b4}.field{display:grid;gap:9px}.field input,.field select{width:100%;border:1px solid #8e7447;border-radius:15px;background:#050716;color:#fff6df;padding:12px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip.on,.gold,.draw{background:#efd98d!important;color:#151021!important}.draw{width:100%;border:0;border-radius:18px;padding:14px;font-weight:900}.spread{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.slot{display:grid;justify-items:center;gap:8px}.label{color:#ffe6a3;font-weight:900}.card{width:150px;height:235px;border:2px solid #c8a95d;border-radius:18px;background:linear-gradient(#111735,#050716);display:grid;place-items:center;text-align:center;padding:12px;position:relative;box-shadow:0 16px 30px #0009;cursor:pointer}.card:before{content:"";position:absolute;inset:10px;border:1px solid #d7b66c99;border-radius:13px}.card>*{position:relative}.back .front{display:none}.back .backface{display:block}.front{display:block}.backface{display:none}.moon{font-size:48px;color:#ffe7a3}.sig{font-size:34px;color:#ffe7a3}.no{font-size:12px;color:#f4d887}.rev{transform:rotate(180deg)}.rev>*{transform:rotate(180deg)}.rec{display:grid;grid-template-columns:1fr 1fr;gap:10px}.rec a{border:1px solid #c8a95d;border-radius:18px;padding:12px;text-decoration:none;text-align:center;color:#151021;font-weight:900}@media(max-width:680px){.spread,.rec{grid-template-columns:1fr}.top a{font-size:13px}}</style></head><body><div class="wrap"><div class="top"><a href="index.html">✦ 回首頁</a><a href="hall.html?v=39000">塔羅畫廊</a><a href="rules.html">委託規則</a></div><section class="hero"><h1>星月抽牌室</h1><p id="count">完整 78 張牌庫</p><p>先洗牌，牌背會排在桌上。請照直覺一張一張點開。</p></section><section class="box field"><input id="question" placeholder="想問什麼？例：我現在適合委什麼品項"><select id="spread"><option value="1">單張牌：今日指引</option><option value="3">三張牌：現在・阻礙・建議</option><option value="5">五張牌：現況・內心・阻礙・可能・建議</option></select><div class="chips"><button class="chip on" data-m="迷惘">迷惘</button><button class="chip" data-m="想可愛">想可愛</button><button class="chip" data-m="想華麗">想華麗</button><button class="chip" data-m="整理設定">整理設定</button><button class="chip" data-m="想驚喜">想驚喜</button></div><button class="draw" id="shuffle">洗牌・展開牌背 ✦</button></section><section class="box" id="table" style="display:none"><h2 id="title">請抽牌</h2><p id="hint">點擊牌背翻牌。</p><div class="spread" id="cards"></div></section><section id="result"></section></div><script>const majors='愚者,魔術師,女祭司,皇后,皇帝,教皇,戀人,戰車,力量,隱者,命運之輪,正義,懸者,轉化,節制,影子,塔,星星,月亮,太陽,審判,世界'.split(','),mrec='QQ,服裝角色,插圖,亮晶晶,色塊,委託規則,色塊,QQ,QQ,服裝角色,插圖,色塊,插圖,服裝角色,亮晶晶,插圖,插圖,亮晶晶,插圖,QQ,服裝角色,色塊'.split(',');const suits=[['權杖','✦','插圖'],['聖杯','☾','亮晶晶'],['寶劍','◇','色塊'],['錢幣','◎','服裝角色']],ranks='A,二,三,四,五,六,七,八,九,十,侍者,騎士,皇后,國王'.split(',');const deck=[...majors.map((n,i)=>({no:i,name:n,kind:'大阿爾克那',sig:'✦',rec:mrec[i]})),...suits.flatMap((s,si)=>ranks.map((r,ri)=>({no:22+si*14+ri,name:s[0]+r,kind:'小阿爾克那',sig:s[1],rec:s[2]})))];count.textContent='完整 '+deck.length+' 張牌庫';let mood='迷惘',picked=[];document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');mood=b.dataset.m});function labs(n){return n==5?['現況','內心','阻礙','可能','建議']:n==3?['現在','阻礙','建議']:['今日指引']}function start(){let n=+spread.value,l=labs(n);picked=[...deck].sort(()=>Math.random()-.5).slice(0,n).map(c=>({...c,rev:Math.random()<.3,open:false}));table.style.display='block';result.innerHTML='';title.textContent='請抽牌｜'+l.join('・');hint.textContent='牌背已展開。點擊牌背翻牌。';cards.innerHTML=picked.map((c,i)=>'<div class="slot"><div class="label">'+l[i]+'</div><div class="card back" data-i="'+i+'"><div class="backface"><div class="no">AKANE TAROT</div><div class="moon">☾</div><small>點擊翻牌</small></div><div class="front"><div class="no">'+String(c.no+1).padStart(2,'0')+' / 78</div><div class="sig">'+c.sig+'</div><h3>'+c.name+(c.rev?' 逆位':' 正位')+'</h3><small>'+c.kind+'</small></div></div></div>').join('');document.querySelectorAll('.card').forEach(c=>c.onclick=()=>flip(+c.dataset.i,c));table.scrollIntoView({behavior:'smooth'})}function flip(i,el){if(picked[i].open)return;picked[i].open=true;el.classList.remove('back');if(picked[i].rev)el.classList.add('rev');if(picked.every(c=>c.open))finish()}function finish(){hint.textContent='牌已翻開。';let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};picked.forEach(c=>score[c.rec]+=c.rev?1:2);if(mood=='想可愛')score.QQ+=2;if(mood=='想華麗'){score.亮晶晶+=2;score.插圖+=1}if(mood=='整理設定')score.服裝角色+=2;if(mood=='想驚喜')score.插圖+=2;let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);result.innerHTML='<section class="box"><h2>解讀</h2>'+picked.map(c=>'【'+c.name+(c.rev?'逆位':'正位')+'】'+(c.rev?'先收斂需求，讓方向更明確。':'適合往「'+c.rec+'」方向嘗試。')).join('<br>')+'<br><br><b>你的問題</b>：'+(question.value||'今天適合委託什麼？')+'<br><b>目前狀態</b>：'+mood+'<h2>適合委託</h2><div class="rec">'+rec.map(k=>'<a class="gold" href="'+(k=='委託規則'?'rules.html':'hall.html?v=39000')+'">'+k+'</a>').join('')+'</div></section>'}shuffle.onclick=start;</script></body></html>
