<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星月抽牌室</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#3c2859,#070818 70%);color:#fff6df;font-family:serif}.wrap{max-width:980px;margin:auto;padding:16px}a,button,select{font:inherit}.top{display:flex;justify-content:space-between;gap:8px;margin-bottom:14px}.top a,.chip{border:1px solid #c8a95d;border-radius:18px;background:#080818;color:#fff6df;padding:10px 12px;text-decoration:none;font-weight:800}.altar{border:2px solid #c8a95d;border-radius:30px;background:radial-gradient(circle at 50% 0,#3a2857,#09091b 65%);padding:18px;text-align:center;box-shadow:0 24px 60px #000b;overflow:hidden}h1{margin:0;color:#fff0b4}.muted{color:#d9cda9;line-height:1.7}.controls{display:grid;gap:9px;margin:14px auto 0;max-width:680px}.controls select{width:100%;border:1px solid #8e7447;border-radius:15px;background:#050716;color:#fff6df;padding:12px}.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}.chip.on,.gold,.draw{background:#efd98d!important;color:#151021!important}.draw{width:100%;border:0;border-radius:18px;padding:14px;font-weight:900}.stage{height:520px;position:relative;margin-top:16px;border:1px solid #8e744766;border-radius:26px;background:radial-gradient(circle at 50% 15%,#171b3d,#060717 70%);overflow:hidden}.deck{position:absolute;left:50%;top:30px;width:130px;height:170px;margin-left:-65px;transition:.35s}.deck.hide{opacity:0;transform:translateY(-10px) scale(.72)}.deckCard{width:88px;height:132px;border:2px solid #c8a95d;border-radius:14px;background:linear-gradient(#111735,#050716);box-shadow:0 12px 20px #0009;position:absolute;left:21px;top:15px;display:grid;place-items:center;color:#ffe7a3}.deckCard:nth-child(1){transform:rotate(-7deg) translateX(-10px)}.deckCard:nth-child(2){transform:rotate(5deg) translateX(8px)}.deckCard:nth-child(3){transform:rotate(0)}.shuffling .deckCard:nth-child(1){animation:shuffleA .75s ease-in-out infinite}.shuffling .deckCard:nth-child(2){animation:shuffleB .75s ease-in-out infinite}.shuffling .deckCard:nth-child(3){animation:shuffleC .75s ease-in-out infinite}@keyframes shuffleA{40%{transform:translateX(-85px) rotate(-18deg)}80%{transform:translateX(30px) rotate(9deg)}}@keyframes shuffleB{40%{transform:translateX(80px) rotate(18deg)}80%{transform:translateX(-25px) rotate(-7deg)}}@keyframes shuffleC{50%{transform:translateY(-16px) rotate(4deg)}}.fan{position:absolute;left:0;right:0;top:30px;height:315px;perspective:900px;overflow:visible}.fanCard,.pickCard{width:88px;height:138px;border:2px solid #c8a95d;border-radius:14px;background:linear-gradient(#111735,#050716);display:grid;place-items:center;color:#ffe7a3;box-shadow:0 15px 24px #0009;cursor:pointer}.fanCard{position:absolute;left:50%;top:15px;margin-left:-44px;transform-origin:50% -42%;opacity:0;animation:fanOpen .75s both;animation-delay:var(--d)}.fanCard:before,.pickCard:before{content:"";position:absolute;inset:9px;border:1px solid #d7b66c99;border-radius:11px}.fanCard span,.pickCard>*{position:relative}.fanCard:hover{filter:brightness(1.18);z-index:8}.fanCard.chosen{animation:selectOut .45s both;pointer-events:none}@keyframes fanOpen{0%{opacity:0;transform:rotate(0deg) translateY(-8px) scale(.72)}100%{opacity:1;transform:rotate(var(--r)) translateY(var(--y)) scale(1)}}@keyframes selectOut{100%{opacity:0;transform:translateY(170px) scale(.55)}}.picked{position:absolute;left:0;right:0;bottom:20px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap}.slot{display:grid;justify-items:center;gap:7px;animation:deal .48s both}.label{color:#ffe6a3;font-weight:900}.pickCard{width:128px;height:198px;position:relative;text-align:center;padding:10px;transition:.55s;transform-style:preserve-3d}.back .front{display:none}.back .backface{display:block}.front{display:block}.backface{display:none}.moon{font-size:42px;color:#ffe7a3}.sig{font-size:30px;color:#ffe7a3}.no{font-size:11px;color:#f4d887}.open{animation:flip .65s both}.rev{transform:rotate(180deg)}.rev>*{transform:rotate(180deg)}@keyframes deal{from{opacity:0;transform:translateY(-160px) scale(.7)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes flip{0%{transform:rotateY(0) scale(1)}45%{transform:rotateY(90deg) scale(1.04)}100%{transform:rotateY(0) scale(1)}}#status{min-height:28px;margin-top:10px;color:#ffe6a3;font-weight:900}.result{line-height:1.8;margin-top:14px;border-top:1px solid #8e744766;padding-top:14px}.rec{display:grid;grid-template-columns:1fr 1fr;gap:10px}.rec a{border:1px solid #c8a95d;border-radius:18px;padding:12px;text-decoration:none;text-align:center;color:#151021;font-weight:900}@media(max-width:680px){.stage{height:560px}.fan{top:32px;height:285px}.fanCard{width:62px;height:100px;margin-left:-31px;transform-origin:50% -46%}.pickCard{width:118px;height:178px}.rec{grid-template-columns:1fr}.top a{font-size:13px}}</style></head><body><div class="wrap"><div class="top"><a href="index.html">✦ 回首頁</a><a href="hall.html?v=39000">塔羅畫廊</a><a href="rules.html">委託規則</a></div><main class="altar"><h1>星月抽牌室</h1><div class="muted" id="count">完整 78 張牌庫｜原位倒扇形版 v10</div><div class="muted">洗牌後會在牌堆原本的位置向下展開成倒扇形，選完牌會接著滑到下方等待翻牌。</div><div class="controls"><select id="spread"><option value="1">單張牌：今日指引</option><option value="3">三張牌：現在・阻礙・建議</option><option value="5">五張牌：現況・內心・阻礙・可能・建議</option></select><div class="chips"><button class="chip on" data-m="迷惘">迷惘</button><button class="chip" data-m="想可愛">想可愛</button><button class="chip" data-m="想華麗">想華麗</button><button class="chip" data-m="整理設定">整理設定</button><button class="chip" data-m="想驚喜">想驚喜</button></div><button class="draw" id="shuffle">開始洗牌 ✦</button></div><section class="stage"><div class="deck" id="deckArea"><div class="deckCard">☾</div><div class="deckCard">✦</div><div class="deckCard">☾</div></div><div class="fan" id="fan"></div><div class="picked" id="pickedRow"></div></section><div id="status">請先洗牌。</div><section class="result" id="result"></section></main></div><script>const majors='愚者,魔術師,女祭司,皇后,皇帝,教皇,戀人,戰車,力量,隱者,命運之輪,正義,懸者,轉化,節制,影子,塔,星星,月亮,太陽,審判,世界'.split(','),mrec='QQ,服裝角色,插圖,亮晶晶,色塊,委託規則,色塊,QQ,QQ,服裝角色,插圖,色塊,插圖,服裝角色,亮晶晶,插圖,插圖,亮晶晶,插圖,QQ,服裝角色,色塊'.split(',');const suits=[['權杖','✦','插圖'],['聖杯','☾','亮晶晶'],['寶劍','◇','色塊'],['錢幣','◎','服裝角色']],ranks='A,二,三,四,五,六,七,八,九,十,侍者,騎士,皇后,國王'.split(',');const deck=[...majors.map((n,i)=>({no:i,name:n,kind:'大阿爾克那',sig:'✦',rec:mrec[i]})),...suits.flatMap((s,si)=>ranks.map((r,ri)=>({no:22+si*14+ri,name:s[0]+r,kind:'小阿爾克那',sig:s[1],rec:s[2]})))];count.textContent='完整 '+deck.length+' 張牌庫｜原位倒扇形版 v10';let mood='迷惘',fanDeck=[],picked=[],need=1;document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');mood=b.dataset.m});function labs(n){return n==5?['現況','內心','阻礙','可能','建議']:n==3?['現在','阻礙','建議']:['今日指引']}function start(){need=+spread.value;shuffle.textContent='洗牌中…';deckArea.classList.remove('hide');deckArea.classList.add('shuffling');fan.innerHTML='';pickedRow.innerHTML='';result.innerHTML='';picked=[];status.textContent='牌正在洗動…';setTimeout(()=>{deckArea.classList.remove('shuffling');deckArea.classList.add('hide');fanDeck=[...deck].sort(()=>Math.random()-.5).slice(0,13).map(c=>({...c,rev:Math.random()<.3,open:false,chosen:false}));renderFan();shuffle.textContent='重新洗牌 ✦';status.textContent='請從原位展開的倒扇形中選 '+need+' 張牌。'},1050)}function renderFan(){fan.innerHTML=fanDeck.map((c,i)=>{let r=-50+i*8.3,y=Math.abs(i-6)*4;return '<div class="fanCard" data-i="'+i+'" style="--r:'+r+'deg;--y:'+y+'px;--d:'+(i*.035)+'s"><span>☾</span></div>'}).join('');document.querySelectorAll('.fanCard').forEach(el=>el.onclick=()=>choose(+el.dataset.i,el))}function choose(i,el){if(fanDeck[i].chosen||picked.length>=need)return;fanDeck[i].chosen=true;picked.push(fanDeck[i]);el.classList.add('chosen');status.textContent='已選 '+picked.length+' / '+need+'。';setTimeout(renderPicked,180);if(picked.length>=need){setTimeout(()=>{status.textContent='選好了，請翻開下方牌背。';fan.style.pointerEvents='none'},450)}}function renderPicked(){let l=labs(need);pickedRow.innerHTML=picked.map((c,i)=>'<div class="slot"><div class="label">'+l[i]+'</div><div class="pickCard back" data-i="'+i+'"><div class="backface"><div class="no">AKANE TAROT</div><div class="moon">☾</div><small>點擊翻牌</small></div><div class="front"><div class="no">'+String(c.no+1).padStart(2,'0')+' / 78</div><div class="sig">'+c.sig+'</div><h3>'+c.name+(c.rev?' 逆位':' 正位')+'</h3><small>'+c.kind+'</small></div></div></div>').join('');document.querySelectorAll('.pickCard').forEach(c=>c.onclick=()=>flip(+c.dataset.i,c))}function flip(i,el){if(picked.length<need||picked[i].open)return;picked[i].open=true;el.classList.add('open');setTimeout(()=>{el.classList.remove('back');if(picked[i].rev)el.classList.add('rev')},280);if(picked.every(c=>c.open))setTimeout(finish,720)}function finish(){status.textContent='牌已翻開。';let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};picked.forEach(c=>score[c.rec]+=c.rev?1:2);if(mood=='想可愛')score.QQ+=2;if(mood=='想華麗'){score.亮晶晶+=2;score.插圖+=1}if(mood=='整理設定')score.服裝角色+=2;if(mood=='想驚喜')score.插圖+=2;let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);result.innerHTML='<h2>解讀</h2>'+picked.map(c=>'【'+c.name+(c.rev?'逆位':'正位')+'】'+(c.rev?'先收斂需求，讓方向更明確。':'適合往「'+c.rec+'」方向嘗試。')).join('<br>')+'<br><br><b>目前狀態</b>：'+mood+'<h2>適合委託</h2><div class="rec">'+rec.map(k=>'<a class="gold" href="'+(k=='委託規則'?'rules.html':'hall.html?v=39000')+'">'+k+'</a>').join('')+'</div>'}shuffle.onclick=start;</script></body></html>
