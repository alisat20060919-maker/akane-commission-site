<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tarot Reading｜茜子的委託小屋</title><style>*{box-sizing:border-box}body{margin:0;background:#02040c;color:#fff4d7;font-family:Georgia,'Times New Roman',serif}.app{max-width:430px;min-height:100svh;margin:auto;position:relative;background:radial-gradient(circle at 50% 18%,#352052,#080915 62%,#02040c);border-left:1px solid #7d5b2a;border-right:1px solid #7d5b2a}.app:before{content:"";position:absolute;inset:8px;border:1px solid #b98b43;border-radius:28px;pointer-events:none}.top{position:absolute;z-index:9;left:22px;right:22px;top:18px;display:flex;justify-content:space-between}.round{width:42px;height:42px;border:1px solid #caa158;border-radius:50%;background:#060817cc;color:#f0cb80;display:grid;place-items:center;text-decoration:none;font-weight:900}.head{text-align:center;padding:78px 22px 0;position:relative;z-index:2}.head h1{margin:0;color:#f0c979;font-size:40px;line-height:.94;letter-spacing:.06em;text-shadow:0 0 20px #000}.head p{margin:10px 0 0;color:#eee2c2;font-size:12px;letter-spacing:.23em}.stage{position:relative;height:540px;margin:8px 10px 0}.stage svg{position:absolute;inset:0;width:100%;height:100%;display:block}.info{position:absolute;top:90px;width:88px;min-height:108px;border:1px solid #bb8b43;border-radius:12px;background:#070918dd;text-align:center;padding:11px 8px;color:#edcb82;z-index:4}.info b{display:block;font-size:12px;line-height:1.25;margin:7px 0}.info small{color:#d0a9ff;font-size:16px}.info.l{left:12px}.info.r{right:12px}.fan{position:absolute;left:0;right:0;top:318px;height:150px;z-index:6;pointer-events:none}.card{position:absolute;left:50%;top:0;width:60px;height:98px;margin-left:-30px;border:1.5px solid #d6ae60;border-radius:8px;background:linear-gradient(#151f46,#080a1c);box-shadow:0 12px 20px #000b;display:grid;place-items:center;color:#e8c778;cursor:pointer;pointer-events:auto;transform-origin:50% -72%;transition:.25s}.card:before{content:"";position:absolute;inset:7px;border:1px solid #c79b50;border-radius:6px}.card span{position:relative}.card:hover,.card.pick{filter:brightness(1.24);transform:var(--t) translateY(13px)!important}.fan.ready .card{animation:fanOpen .7s both;animation-delay:var(--d)}@keyframes fanOpen{from{opacity:0;transform:rotate(0deg) translateY(-90px) scale(.65)}to{opacity:1;transform:var(--t)}}.msg{margin:6px 30px 0;border:1px solid #bd8c43;border-radius:18px;background:#060817d9;padding:13px 14px;text-align:center;box-shadow:0 0 28px #000}.msg h2{margin:0;color:#f0c979;letter-spacing:.08em}.msg p{margin:7px 0 0;color:#ded2ba;font-size:13px;line-height:1.45}.btn{display:block;margin:14px auto 0;width:min(280px,72%);border:1px solid #d7a956;border-radius:999px;background:linear-gradient(#8335b2,#2a143f);box-shadow:0 0 28px #a245ff;color:#ffe6ae;padding:14px;text-align:center;font-weight:900;letter-spacing:.05em;cursor:pointer}.flip{display:none;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 18px 0}.pickCard{min-height:132px;border:2px solid #cfa75a;border-radius:14px;background:linear-gradient(#131a39,#050716);box-shadow:0 12px 22px #000c;display:grid;place-items:center;text-align:center;padding:8px;cursor:pointer;overflow:hidden}.pickCard .num{font-size:14px;color:#f0c979;margin-bottom:6px}.pickCard h3{margin:2px 0;color:#fff4d7;font-size:17px;line-height:1.2;word-break:keep-all}.pickCard b{display:block;color:#f0c979;font-size:15px;margin-top:4px}.pickCard small{display:block;color:#d9cda9;font-size:11px;line-height:1.2}.gold{color:#f0c979}.nav{height:88px;margin:16px 16px 16px;border:1px solid #8b6835;border-radius:28px;background:#050817e8;display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden}.nav div{display:grid;place-items:center;text-align:center;color:#dec28a;font-size:11px;border-left:1px solid #3b2a20}.nav div:first-child{border-left:0;background:linear-gradient(#23113b,#100817);box-shadow:inset 0 -4px 18px #9d3dff}.result{display:none;margin:0 18px 22px;border:1px solid #a77d3a;border-radius:20px;background:#070918dd;padding:16px;line-height:1.7}.result h2{color:#f0c979;margin:0 0 8px}@media(max-width:380px){.head h1{font-size:34px}.info{width:78px;font-size:12px}.card{width:54px;height:92px;margin-left:-27px}.stage{height:520px}.flip{gap:7px;margin-left:12px;margin-right:12px}.pickCard h3{font-size:15px}}</style></head><body><main class="app"><div class="top"><a class="round" href="index.html">☰</a><a class="round" href="hall.html?v=39000">✦</a></div><section class="head"><h1>TAROT<br>READING</h1><p>DISCOVER YOUR PATH</p></section><section class="stage"><svg viewBox="0 0 430 540" aria-hidden="true"><defs><radialGradient id="g" cx="50%" cy="42%"><stop offset="0" stop-color="#fff"/><stop offset=".18" stop-color="#c58cff"/><stop offset=".48" stop-color="#6533d7"/><stop offset="1" stop-color="#17206c"/></radialGradient><linearGradient id="robe" x1="0" x2="1"><stop stop-color="#160b25"/><stop offset=".5" stop-color="#4b2361"/><stop offset="1" stop-color="#12091c"/></linearGradient></defs><path d="M35 70 C65 45 105 45 135 72" fill="none" stroke="#79582d"/><path d="M295 72 C325 45 365 45 395 70" fill="none" stroke="#79582d"/><path d="M120 258 C132 125 298 125 310 258" fill="#05060d" opacity=".9"/><path d="M145 252 C160 190 270 190 286 252 L325 320 C268 348 165 348 105 320 Z" fill="url(#robe)" stroke="#9f793a"/><circle cx="215" cy="202" r="48" fill="#6d3e3d" stroke="#251015"/><path d="M150 208 C172 138 258 138 282 208 C245 188 188 188 150 208" fill="#08060d"/><text x="215" y="193" text-anchor="middle" fill="#b789ff" font-size="24">✦</text><ellipse cx="129" cy="324" rx="42" ry="15" fill="#936351" opacity=".95"/><ellipse cx="301" cy="324" rx="42" ry="15" fill="#936351" opacity=".95"/><ellipse cx="215" cy="378" rx="190" ry="78" fill="#160b23" stroke="#8e6b35"/><circle cx="215" cy="318" r="46" fill="url(#g)" filter="drop-shadow(0 0 18px #a75cff)"/><ellipse cx="215" cy="370" rx="36" ry="11" fill="#a26d32"/><path d="M84 352 C150 328 280 328 346 352" fill="none" stroke="#7d5b2a"/></svg><div class="info l">☾<b>YOUR<br>ENERGY</b><small>High</small></div><div class="info r">✦<b>TODAY'S<br>GUIDANCE</b><small>3 Cards</small></div><div class="fan" id="fan"></div></section><section class="msg"><h2 id="mainTitle">CHOOSE YOUR CARD</h2><p id="hint">牌師會攤開牌，請選擇呼喚你的牌。</p></section><button class="btn" id="ready">I'M READY</button><section class="flip" id="flip"></section><div class="nav"><div>▰<br>READING</div><div>▱<br>SPREADS</div><div>☾<br>DAILY</div><div>○<br>PROFILE</div></div><section class="result" id="result"></section></main><script>const majors='愚者,魔術師,女祭司,皇后,皇帝,教皇,戀人,戰車,力量,隱者,命運之輪,正義,懸者,轉化,節制,影子,塔,星星,月亮,太陽,審判,世界'.split(','),mrec='QQ,服裝角色,插圖,亮晶晶,色塊,委託規則,色塊,QQ,QQ,服裝角色,插圖,色塊,插圖,服裝角色,亮晶晶,插圖,插圖,亮晶晶,插圖,QQ,服裝角色,色塊'.split(',');const suits=[['權杖','✦','插圖'],['聖杯','☾','亮晶晶'],['寶劍','◇','色塊'],['錢幣','◎','服裝角色']],ranks='A,二,三,四,五,六,七,八,九,十,侍者,騎士,皇后,國王'.split(',');const deck=[...majors.map((n,i)=>({no:i,name:n,kind:'大阿爾克那',sig:'✦',rec:mrec[i]})),...suits.flatMap((s,si)=>ranks.map((r,ri)=>({no:22+si*14+ri,name:s[0]+r,kind:'小阿爾克那',sig:s[1],rec:s[2]})))];let picked=[],cards=[],need=3;function layout(c,i){let r=-48+i*8,y=Math.abs(i-6)*5;return '<div class="card" data-i="'+i+'" style="--t:rotate('+r+'deg) translateY('+y+'px);--d:'+(i*.035)+'s"><span>☾</span></div>'}function start(){picked=[];result.style.display='none';flip.style.display='none';flip.innerHTML='';ready.textContent='SHUFFLING...';mainTitle.textContent='TAROT READING';hint.textContent='牌師正在洗牌，水晶球正在發光。';fan.classList.remove('ready');fan.innerHTML='';setTimeout(()=>{cards=[...deck].sort(()=>Math.random()-.5).slice(0,13).map(c=>({...c,rev:Math.random()<.3,open:false}));fan.innerHTML=cards.map(layout).join('');fan.classList.add('ready');ready.textContent='選擇牌背';mainTitle.textContent='CHOOSE YOUR CARD';hint.textContent='牌師已攤開牌陣，請選 '+need+' 張。';document.querySelectorAll('.card').forEach(el=>el.onclick=()=>choose(+el.dataset.i,el))},650)}function choose(i,el){if(picked.length>=need||el.classList.contains('pick'))return;el.classList.add('pick');picked.push(cards[i]);hint.textContent='已選 '+picked.length+' / '+need;if(picked.length>=need)setTimeout(showFlip,420)}function showFlip(){flip.style.display='grid';flip.innerHTML=picked.map((c,i)=>'<div class="pickCard" data-i="'+i+'"><div><div class="num">'+String(c.no+1).padStart(2,'0')+' / 78</div><h3>☾</h3><small>點擊翻牌</small></div></div>').join('');hint.textContent='選好了，請翻開你的牌。';flip.scrollIntoView({behavior:'smooth',block:'center'});document.querySelectorAll('.pickCard').forEach(el=>el.onclick=()=>turn(+el.dataset.i,el))}function turn(i,el){let c=picked[i];if(c.open)return;c.open=1;el.innerHTML='<div><div class="num">'+String(c.no+1).padStart(2,'0')+' / 78</div><h3>'+c.name+'</h3><b>'+(c.rev?'逆位':'正位')+'</b><small>'+c.kind+'</small></div>';if(picked.every(x=>x.open))finish()}function finish(){let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};picked.forEach(c=>score[c.rec]+=c.rev?1:2);let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);result.style.display='block';result.innerHTML='<h2>READING RESULT</h2>'+picked.map(c=>'【'+c.name+(c.rev?'逆位':'正位')+'】'+(c.rev?'先收斂需求，讓方向更明確。':'適合往「'+c.rec+'」方向嘗試。')).join('<br>')+'<h2>適合委託</h2>'+rec.join('・');result.scrollIntoView({behavior:'smooth',block:'start'})}ready.onclick=start;fan.innerHTML=Array.from({length:13},(_,i)=>layout({},i)).join('');fan.classList.add('ready');</script></body></html>
