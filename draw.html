<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星月抽牌｜茜子的委託小屋</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#34214d,#0b0d24 45%,#050615);color:#fff6df;font-family:serif}.wrap{max-width:920px;margin:0 auto;padding:16px}.top{display:flex;justify-content:space-between;gap:8px;margin-bottom:14px}.top a,.btn,.chip,.rec a{border:1px solid #c8a95d;border-radius:18px;background:#080818;color:#fff6df;padding:10px 13px;font-weight:800;text-decoration:none}.hero{border:2px solid #c8a95d;border-radius:26px;background:linear-gradient(#2f2148,#09091b);padding:18px;text-align:center;box-shadow:0 20px 50px #0009}.hero h1{margin:0 0 8px;color:#fff0b4}.pill{display:inline-block;border:1px solid #d7b66c;border-radius:999px;padding:6px 12px;background:#050716;color:#ffe6a3;font-weight:900}.box{border:1px solid #8e7447;border-radius:22px;background:#080818bb;padding:14px;margin-top:12px}.form{display:grid;gap:10px}.form input,.form select{width:100%;border:1px solid #8e7447;border-radius:16px;background:#050716;color:#fff6df;padding:12px;font-size:16px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:8px 10px}.chip.on{background:#efd98d;color:#151021}.draw{width:100%;border:0;border-radius:18px;background:linear-gradient(#fff0b0,#c9a14f);color:#151021;padding:14px;font-size:18px;font-weight:900}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.card{min-height:250px;border:2px solid #c8a95d;border-radius:18px;background:linear-gradient(#111735,#060817);display:grid;place-items:center;text-align:center;padding:14px;position:relative;box-shadow:0 18px 32px #0009}.card:before{content:"";position:absolute;inset:10px;border:1px solid #d7b66c99;border-radius:13px}.card>*{position:relative}.sig{font-size:38px;color:#ffe7a3;text-shadow:0 0 14px #f7d47977}.no{font-size:12px;color:#f4d887;letter-spacing:.12em}.rev{transform:rotate(180deg)}.rev>*{transform:rotate(180deg)}.read{line-height:1.8}.read b{color:#fff0b4}.rec{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.rec a{display:block;text-align:center}.gold{background:#efd98d!important;color:#151021!important}@media(max-width:680px){.cards,.rec{grid-template-columns:1fr}.card{min-height:190px}.top a{font-size:13px}}</style></head><body><div class="wrap"><div class="top"><a href="index.html">✦ 回首頁</a><a href="hall.html?v=39000">塔羅畫廊</a><a href="rules.html">委託規則</a></div><section class="hero"><h1>星月抽牌室</h1><span class="pill" id="count">完整 78 張牌庫</span><p>選擇牌陣、洗牌、切牌、抽牌。結果會依照牌面推薦適合委託的品項。</p></section><section class="box form"><input id="q" placeholder="想問什麼？例：我現在適合委什麼品項"><select id="spread"><option value="1">單張牌：今日指引</option><option value="3">三張牌：現在・阻礙・建議</option><option value="5">五張牌：現況・內心・阻礙・可能・建議</option></select><div class="chips"><button class="chip on" data-m="迷惘">迷惘</button><button class="chip" data-m="想可愛">想可愛</button><button class="chip" data-m="想華麗">想華麗</button><button class="chip" data-m="整理設定">整理設定</button><button class="chip" data-m="想驚喜">想驚喜</button></div><button class="draw" id="draw">洗牌・切牌・抽牌 ✦</button></section><section id="out"></section></div><script>const majors='愚者,魔術師,女祭司,皇后,皇帝,教皇,戀人,戰車,力量,隱者,命運之輪,正義,懸者,轉化,節制,誘惑,塔,星星,月亮,太陽,審判,世界'.split(','),mrec='QQ,服裝角色,插圖,亮晶晶,色塊,委託規則,色塊,QQ,QQ,服裝角色,插圖,色塊,插圖,服裝角色,亮晶晶,插圖,插圖,亮晶晶,插圖,QQ,服裝角色,色塊'.split(','),mkey='新開始,創造,直覺,療癒,秩序,規則,關係,推進,力量,沉澱,驚喜,平衡,等待,轉換,調和,吸引,突破,希望,夢境,快樂,整理,完成'.split(',');const suits=[['權杖','✦','行動與創作火花','插圖'],['聖杯','☾','情感與柔軟氛圍','亮晶晶'],['寶劍','◇','思考與清楚輪廓','色塊'],['錢幣','◎','成果與收藏成品','服裝角色']],ranks='A:起點,二:選擇,三:成果,四:穩定,五:調整,六:支持,七:挑戰,八:速度,九:完成前,十:完成,侍者:新訊息,騎士:前進,皇后:滋養,國王:定案'.split(',').map(x=>x.split(':'));const deck=[...majors.map((n,i)=>({no:i,name:n,kind:'大阿爾克那',sig:'✦',key:mkey[i],rec:mrec[i]})),...suits.flatMap((s,si)=>ranks.map((r,ri)=>({no:22+si*14+ri,name:s[0]+r[0],kind:'小阿爾克那｜'+s[0],sig:s[1],key:s[2]+'・'+r[1],rec:s[3]})))];document.getElementById('count').textContent='完整 '+deck.length+' 張牌庫';let mood='迷惘';document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');mood=b.dataset.m});function draw(){let n=+spread.value,lab=n===5?['現況','內心','阻礙','可能','建議']:n===3?['現在','阻礙','建議']:['今日指引'];let arr=[...deck].sort(()=>Math.random()-.5).slice(0,n).map(c=>({...c,rev:Math.random()<.3}));let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};arr.forEach(c=>score[c.rec]+=c.rev?1:2);if(mood==='想可愛')score.QQ+=2;if(mood==='想華麗'){score.亮晶晶+=2;score.插圖+=1}if(mood==='整理設定')score.服裝角色+=2;if(mood==='想驚喜')score.插圖+=2;let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);out.innerHTML='<div class="cards">'+arr.map((c,i)=>'<div class="card '+(c.rev?'rev':'')+'"><div><div class="no">'+String(c.no+1).padStart(2,'0')+' / 78</div><div class="sig">'+c.sig+'</div><h3>'+lab[i]+'｜'+c.name+(c.rev?' 逆位':' 正位')+'</h3><small>'+c.kind+'<br>'+c.key+'</small></div></div>').join('')+'</div><div class="box read"><b>解讀</b><br>'+arr.map(c=>'【'+c.name+(c.rev?'逆位':'正位')+'】'+(c.rev?'先收斂需求、降低壓力，讓委託方向更明確。':'適合往「'+c.rec+'」方向嘗試。')).join('<br>')+'<br><br><b>你的問題</b>：'+(q.value||'今天適合委託什麼？')+'<br><b>目前狀態</b>：'+mood+'<h3>適合委託</h3><div class="rec">'+rec.map(k=>'<a class="gold" href="'+(k==='委託規則'?'rules.html':'hall.html?v=39000')+'">'+k+'</a>').join('')+'</div></div>'}draw.onclick=draw;</script></body></html>
