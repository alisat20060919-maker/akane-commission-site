<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>委託規則｜茜子的委託小屋</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="tarot-ui.css"></head><body><div class="wrap"><header class="topbar"><a class="brand" href="index.html"><span>✦</span><span>Back to Cards</span></a><nav class="nav"><a href="queue.html">排單</a><a href="gallery.html">畫廊</a><a href="index.html">牌桌</a></nav></header><main class="page-hero panel"><p class="crumb">House Rules</p><h1 class="page-title">委託規則</h1><p class="lead">這裡是委託規則頁。先保留乾淨版面，之後可以補上完整條款。</p><div class="content-grid"><section class="box"><h2>準備資料</h2><p>請準備角色資料、想要的品項、預算與希望風格。</p></section><section class="box"><h2>流程</h2><p>討論需求 → 確認排單 → 草圖確認 → 完稿確認 → 交付檔案。</p></section><section class="box"><h2>修改</h2><p>草圖階段確認大方向，後續調整依內容討論。</p></section><section class="box"><h2>其他</h2><p>特殊需求請一開始說明，方便評估是否適合接案。</p></section></div><p style="margin-top:22px"><a class="btn primary" href="index.html">返回牌桌</a></p></main><footer class="footer">Rules page</footer></div></body></html>
