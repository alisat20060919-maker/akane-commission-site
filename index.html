<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>茜子的委託小屋｜選牌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tarot-ui.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="index.html"><span>✦</span><span>Akane Tarot Atelier</span></a>
      <nav class="nav" aria-label="網站導覽">
        <a href="queue.html">排單表</a>
        <a href="gallery.html">畫廊</a>
        <a href="rules.html">委託規則</a>
      </nav>
    </header>

    <main class="hero">
      <section>
        <div class="roman">XVII</div>
        <div class="moon">☾</div>
        <div class="ornament">✧ —— ✦ —— ✧</div>
        <h1>茜子的委託小屋</h1>
        <p class="subtitle">像遊戲選牌一樣，選一張最吸引你的委託牌。</p>

        <section class="selector-panel">
          <button class="fan-arrow fan-prev" type="button" aria-label="上一張">◁</button>
          <div class="fan-stage" id="fanStage">
            <div class="fan-inner">
              <button class="tarot-card active" data-index="0" data-title="QQ 系列" data-desc="可愛小像、頭貼、表情與小型展示圖。" data-link="qq.html" style="--x:40px;--y:20px;--r:-12deg"><span class="card-inner"><span class="arcana">ARCANA I</span><span class="card-symbol">🍒</span><span class="card-name">QQ</span></span></button>
              <button class="tarot-card" data-index="1" data-title="色塊系列" data-desc="單人立繪、雙人互動、角色氛圍展示。" data-link="color.html" style="--x:200px;--y:55px;--r:-7deg"><span class="card-inner"><span class="arcana">ARCANA II</span><span class="card-symbol">🎨</span><span class="card-name">色塊</span></span></button>
              <button class="tarot-card" data-index="2" data-title="亮晶晶系列" data-desc="星空、寶石、玻璃感、閃亮氛圍。" data-link="sparkle.html" style="--x:360px;--y:85px;--r:-2deg"><span class="card-inner"><span class="arcana">ARCANA III</span><span class="card-symbol">✦</span><span class="card-name">亮晶晶</span></span></button>
              <button class="tarot-card" data-index="3" data-title="驚喜包插圖" data-desc="構圖與畫面交給我發揮，保留抽牌般的驚喜感。" data-link="surprise.html" style="--x:520px;--y:85px;--r:2deg"><span class="card-inner"><span class="arcana">ARCANA IV</span><span class="card-symbol">🎁</span><span class="card-name">驚喜包</span></span></button>
              <button class="tarot-card" data-index="4" data-title="服裝＆角色設計" data-desc="服裝、配色、主題元素與簡易角色設計。" data-link="design.html" style="--x:680px;--y:55px;--r:7deg"><span class="card-inner"><span class="arcana">ARCANA V</span><span class="card-symbol">🧵</span><span class="card-name">服設</span></span></button>
              <button class="tarot-card" data-index="5" data-title="其他品項" data-desc="其他延伸委託、自帶價、特殊需求。" data-link="other.html" style="--x:840px;--y:20px;--r:12deg"><span class="card-inner"><span class="arcana">ARCANA VI</span><span class="card-symbol">🌙</span><span class="card-name">其他</span></span></button>
            </div>
          </div>
          <button class="fan-arrow fan-next" type="button" aria-label="下一張">▷</button>

          <div class="choice-panel">
            <p class="choice-label">SELECTED CARD</p>
            <h2 id="choiceTitle">QQ 系列</h2>
            <p id="choiceDesc">可愛小像、頭貼、表情與小型展示圖。</p>
            <a class="choice-btn" id="choiceLink" href="qq.html">查看此品項</a>
          </div>
        </section>
      </section>
    </main>
    <footer class="footer">© Akane Commission Atelier｜solid tarot cards v1</footer>
  </div>

  <script>
    const cards=[...document.querySelectorAll('.tarot-card')];
    const titleEl=document.getElementById('choiceTitle');
    const descEl=document.getElementById('choiceDesc');
    const linkEl=document.getElementById('choiceLink');
    const fanStage=document.getElementById('fanStage');
    let activeIndex=0;
    function selectCard(index,scrollCard=true){
      activeIndex=(index+cards.length)%cards.length;
      const card=cards[activeIndex];
      cards.forEach((c,i)=>c.classList.toggle('active',i===activeIndex));
      titleEl.textContent=card.dataset.title;
      descEl.textContent=card.dataset.desc;
      linkEl.href=card.dataset.link;
      if(scrollCard)card.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    }
    cards.forEach((card,index)=>card.addEventListener('click',()=>selectCard(index,true)));
    document.querySelector('.fan-prev').addEventListener('click',()=>selectCard(activeIndex-1,true));
    document.querySelector('.fan-next').addEventListener('click',()=>selectCard(activeIndex+1,true));
    fanStage.addEventListener('scroll',()=>{
      const center=fanStage.scrollLeft+fanStage.clientWidth/2;
      let closest=0,dist=Infinity;
      cards.forEach((card,index)=>{const c=card.offsetLeft+card.offsetWidth/2;const d=Math.abs(c-center);if(d<dist){dist=d;closest=index;}});
      if(closest!==activeIndex)selectCard(closest,false);
    },{passive:true});
  </script>
</body>
</html>
