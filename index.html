<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>茜子的委託小屋｜選牌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tarot-ui.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="index.html"><span>✦</span><span>Akane Tarot Atelier</span></a>
      <nav class="nav" aria-label="網站導覽">
        <a href="queue.html">排單表</a>
        <a href="gallery.html">畫廊</a>
        <a href="rules.html">委託規則</a>
      </nav>
    </header>

    <main class="hero">
      <section>
        <div class="roman">XVII</div>
        <div class="moon">☾</div>
        <div class="ornament">✧ —— ✦ —— ✧</div>
        <h1>茜子的委託小屋</h1>
        <p class="subtitle">拖曳倒扇形牌帶，選擇一張委託牌。</p>

        <section class="game-select panel">
          <div class="select-stage">
            <button class="fan-arrow fan-prev" type="button">◁</button>
            <div class="fan-scroll" id="fanScroll">
              <div class="fan-layer">
                <svg class="fan-art" viewBox="0 0 1120 300">
                  <path class="fan-base" d="M68 92 C210 22 342 112 500 126 C620 137 730 74 846 54 C944 38 1016 58 1062 94 L1000 215 C760 282 368 282 104 214 Z" />
                  <path class="fan-glow" d="M95 108 C250 63 372 128 505 137 C620 145 724 94 836 78 C924 65 982 75 1030 104 L982 190 C742 240 382 240 132 190 Z" />
                  <path class="fan-top" d="M68 92 C210 22 342 112 500 126 C620 137 730 74 846 54 C944 38 1016 58 1062 94" />
                  <path class="fan-bottom" d="M104 214 C368 282 760 282 1000 215" />
                  <g class="fan-lines">
                    <path d="M220 67 L250 248" />
                    <path d="M370 110 L390 270" />
                    <path d="M520 128 L525 282" />
                    <path d="M672 112 L660 279" />
                    <path d="M822 60 L792 252" />
                  </g>
                </svg>
                <button class="fan-choice active" style="--x:88px;--y:122px" type="button" data-index="0"><span>✦</span></button>
                <button class="fan-choice" style="--x:244px;--y:138px" type="button" data-index="1"><span>✧</span></button>
                <button class="fan-choice" style="--x:404px;--y:150px" type="button" data-index="2"><span>☾</span></button>
                <button class="fan-choice" style="--x:566px;--y:150px" type="button" data-index="3"><span>✦</span></button>
                <button class="fan-choice" style="--x:730px;--y:134px" type="button" data-index="4"><span>✧</span></button>
                <button class="fan-choice" style="--x:892px;--y:118px" type="button" data-index="5"><span>☽</span></button>
              </div>
            </div>
            <button class="fan-arrow fan-next" type="button">▷</button>
          </div>

          <div class="choice-panel">
            <p class="choice-label">SELECTED CARD</p>
            <h2 id="choiceTitle">QQ 系列</h2>
            <p id="choiceDesc">可愛小像、頭貼、表情與小型展示圖。</p>
            <a class="btn primary" id="choiceLink" href="qq.html">查看此品項</a>
          </div>
        </section>

        <div class="quick-links">
          <a class="btn" href="queue.html">排單表</a>
          <a class="btn" href="gallery.html">作品畫廊</a>
          <a class="btn" href="rules.html">委託規則</a>
        </div>
      </section>
    </main>
    <footer class="footer">© Akane Commission Atelier｜scrollable fan selector</footer>
  </div>

  <script>
    const data = [
      ['QQ 系列','可愛小像、頭貼、表情與小型展示圖。','qq.html'],
      ['色塊系列','單人立繪、雙人互動、角色氛圍展示。','color.html'],
      ['亮晶晶系列','星空、寶石、玻璃感、閃亮氛圍。','sparkle.html'],
      ['驚喜包插圖','構圖與畫面交給我發揮。','surprise.html'],
      ['服裝＆角色設計','服裝、配色、主題元素與角色設計。','design.html'],
      ['其他品項','其他延伸委託與自帶價討論。','other.html']
    ];
    const fanScroll = document.querySelector('#fanScroll');
    const choices = [...document.querySelectorAll('.fan-choice')];
    const title = document.querySelector('#choiceTitle');
    const desc = document.querySelector('#choiceDesc');
    const link = document.querySelector('#choiceLink');
    let active = 0;

    function selectCard(index, move) {
      active = (index + data.length) % data.length;
      choices.forEach((c, i) => c.classList.toggle('active', i === active));
      title.textContent = data[active][0];
      desc.textContent = data[active][1];
      link.href = data[active][2];
      if (move) choices[active].scrollIntoView({inline:'center', block:'nearest'});
    }
    choices.forEach(c => c.addEventListener('click', () => selectCard(Number(c.dataset.index), true)));
    document.querySelector('.fan-prev').addEventListener('click', () => selectCard(active - 1, true));
    document.querySelector('.fan-next').addEventListener('click', () => selectCard(active + 1, true));
  </script>
</body>
</html>
