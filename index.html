<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>茜子的委託小屋｜選牌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tarot-ui.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="index.html"><span>✦</span><span>Akane Tarot Atelier</span></a>
      <nav class="nav" aria-label="網站導覽">
        <a href="queue.html">排單表</a>
        <a href="gallery.html">畫廊</a>
        <a href="rules.html">委託規則</a>
      </nav>
    </header>

    <main class="hero">
      <section>
        <div class="roman">XVII</div>
        <div class="moon">☾</div>
        <div class="ornament">✧ —— ✦ —— ✧</div>
        <h1>茜子的委託小屋</h1>
        <p class="subtitle">滑動倒扇形牌陣，選擇一張委託牌。</p>

        <section class="game-select panel" aria-label="委託品項選擇畫面">
          <div class="select-stage">
            <div class="fan-viewport">
              <div class="fan-track">
                <button class="tarot-card active" type="button" style="--x:32px;--y:28px;--r:-10deg" data-title="QQ 系列" data-desc="可愛小像、頭貼、表情與小型展示圖。" data-link="qq.html" aria-label="選擇 QQ 系列">
                  <span class="card-face"><span class="card-border"><span class="arcana">I</span><span class="symbol">🍒</span></span></span>
                </button>
                <button class="tarot-card" type="button" style="--x:244px;--y:58px;--r:-6deg" data-title="色塊系列" data-desc="單人立繪、雙人互動、角色氛圍展示。" data-link="color.html" aria-label="選擇 色塊系列">
                  <span class="card-face"><span class="card-border"><span class="arcana">II</span><span class="symbol">🎨</span></span></span>
                </button>
                <button class="tarot-card" type="button" style="--x:456px;--y:82px;--r:-2deg" data-title="亮晶晶系列" data-desc="星空、寶石、玻璃感、藍紫色閃亮氛圍。" data-link="sparkle.html" aria-label="選擇 亮晶晶系列">
                  <span class="card-face"><span class="card-border"><span class="arcana">III</span><span class="symbol">✦</span></span></span>
                </button>
                <button class="tarot-card" type="button" style="--x:668px;--y:82px;--r:2deg" data-title="驚喜包插圖" data-desc="構圖與畫面交給我發揮，保留抽牌般的驚喜感。" data-link="surprise.html" aria-label="選擇 驚喜包插圖">
                  <span class="card-face"><span class="card-border"><span class="arcana">IV</span><span class="symbol">🎁</span></span></span>
                </button>
                <button class="tarot-card" type="button" style="--x:880px;--y:58px;--r:6deg" data-title="服裝＆角色設計" data-desc="服裝、配色、主題元素與簡易角色設計。" data-link="design.html" aria-label="選擇 服裝與角色設計">
                  <span class="card-face"><span class="card-border"><span class="arcana">V</span><span class="symbol">🧵</span></span></span>
                </button>
                <button class="tarot-card" type="button" style="--x:1092px;--y:28px;--r:10deg" data-title="其他品項" data-desc="自帶價、特殊需求、小物或其他延伸委託。" data-link="other.html" aria-label="選擇 其他品項">
                  <span class="card-face"><span class="card-border"><span class="arcana">VI</span><span class="symbol">🌙</span></span></span>
                </button>
              </div>
            </div>
          </div>

          <div class="choice-panel">
            <p class="choice-label">SELECTED CARD</p>
            <h2 id="choiceTitle">QQ 系列</h2>
            <p id="choiceDesc">可愛小像、頭貼、表情與小型展示圖。</p>
            <a class="btn primary" id="choiceLink" href="qq.html">查看此品項</a>
          </div>
        </section>

        <div class="quick-links">
          <a class="btn" href="queue.html">排單表</a>
          <a class="btn" href="gallery.html">作品畫廊</a>
          <a class="btn" href="rules.html">委託規則</a>
        </div>
      </section>
    </main>
    <footer class="footer">© Akane Commission Atelier｜Inverted fan game UI v7</footer>
  </div>

  <script>
    const cards = [...document.querySelectorAll('.tarot-card')];
    const title = document.querySelector('#choiceTitle');
    const desc = document.querySelector('#choiceDesc');
    const link = document.querySelector('#choiceLink');

    function selectCard(card) {
      cards.forEach(item => item.classList.toggle('active', item === card));
      title.textContent = card.dataset.title;
      desc.textContent = card.dataset.desc;
      link.href = card.dataset.link;
    }

    cards.forEach(card => card.addEventListener('click', () => selectCard(card)));
  </script>
</body>
</html>
