<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>小人逛展｜畫廊測試頁</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;background:#070814;color:#fff6df;font-family:'Noto Serif TC',serif}.game{height:100dvh;padding:8px;background:radial-gradient(circle at 50% 0,#474b74,#141731 44%,#050611)}.top{height:42px;display:flex;justify-content:space-between;align-items:center;width:min(1040px,100%);margin:auto}.top a{color:#f1d98e;text-decoration:none;border:1px solid rgba(239,216,142,.28);border-radius:999px;background:rgba(0,0,0,.28);padding:8px 11px;font-size:.84rem}.brand{font-family:Cinzel,serif;letter-spacing:.08em}.screen{position:relative;width:min(1040px,100%);height:calc(100dvh - 112px);min-height:540px;margin:auto;border:1px solid rgba(239,216,142,.35);border-radius:28px;overflow:hidden;background:linear-gradient(180deg,rgba(9,10,25,.25),rgba(9,10,25,.45)),url('https://drive.google.com/thumbnail?id=15tN2XzOZEtrjLNhHA54bzMYWSuCZZ6f8&sz=w1800') center/cover no-repeat,linear-gradient(180deg,#242850,#090a18);box-shadow:0 34px 72px rgba(0,0,0,.5)}.room{position:absolute;left:4%;right:4%;top:12%;bottom:22%;border:1px solid rgba(239,216,142,.25);border-radius:26px;background:linear-gradient(180deg,rgba(25,28,58,.88),rgba(7,8,22,.9));box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 18px 44px rgba(0,0,0,.34)}.room:before{content:"";position:absolute;left:0;right:0;top:0;height:28%;border-radius:26px 26px 0 0;background:linear-gradient(180deg,rgba(239,216,142,.1),rgba(239,216,142,.03),transparent);border-bottom:1px solid rgba(239,216,142,.16)}.floorMark{position:absolute;left:12%;right:12%;top:36%;bottom:12%;border:1px solid rgba(239,216,142,.14);border-radius:24px;background:radial-gradient(circle at 50% 55%,rgba(239,216,142,.18),transparent 33%),repeating-linear-gradient(90deg,transparent 0 64px,rgba(239,216,142,.06) 65px,transparent 66px),repeating-linear-gradient(180deg,transparent 0 64px,rgba(239,216,142,.05) 65px,transparent 66px)}.hud{position:absolute;left:16px;right:16px;top:14px;z-index:40;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.hudTitle{border:1px solid rgba(239,216,142,.28);border-radius:18px;background:rgba(3,5,17,.68);padding:9px 11px;backdrop-filter:blur(8px)}.hudTitle b{display:block;color:#fff3bf;font-size:1.06rem}.hudTitle span{color:rgba(255,246,223,.72);font-size:.78rem}.hudMini{border:1px solid rgba(239,216,142,.26);border-radius:999px;background:rgba(3,5,17,.62);padding:9px 12px;color:#e8d79e;height:max-content}.art{position:absolute;z-index:12;display:block;text-decoration:none;color:#fff6df;transform:translate(-50%,-50%);width:18%;max-width:150px;min-width:70px;border:1px solid rgba(239,216,142,.28);border-radius:15px;background:rgba(5,7,20,.55);padding:6px;box-shadow:0 14px 28px rgba(0,0,0,.4);transition:.16s}.art img{display:block;width:100%;aspect-ratio:1/1;object-fit:contain;background:#fff;border:5px solid #d8bd73;border-radius:10px}.art span{display:block;text-align:center;color:rgba(255,246,223,.86);font-size:.7rem;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.art.focus{filter:drop-shadow(0 0 18px rgba(239,216,142,.46));transform:translate(-50%,-50%) scale(1.04);border-color:rgba(239,216,142,.65)}.art[data-side="left"],.art[data-side="right"]{width:16%}.player{position:absolute;z-index:25;left:var(--x);top:var(--y);width:42px;height:54px;transform:translate(-50%,-85%);transition:left .15s linear,top .15s linear;filter:drop-shadow(0 12px 14px rgba(0,0,0,.45))}.player:before{content:"";position:absolute;left:8px;right:8px;top:0;height:24px;border-radius:50% idth:min(1040px,100%);margin:8px auto 0;display:flex;gap:8px;overflow:auto;padding-bottom:3px}.tabs button{flex:0 0 auto;border:1px solid rgba(239,216,142,.34);border-radius:999px;background:rgba(255,255,255,.07);color:#fff6df;padding:9px 13px;font:900 .9rem 'Noto Serif TC',serif}.tabs button.on{background:#efd98d;color:#171329}@media(max-width:700px){.game{padding:8px}.screen{height:calc(100dvh - 108px);min-height:520px;border-radius:24px}.room{left:3%;right:3%;top:12%;bottom:24%;border-radius:22px}.hud{left:12px;right:12px;top:10px}.hudTitle b{font-size:.95rem}.hudTitle span{font-size:.7rem}.hudMini{font-size:.72rem;padding:8px 9px}.art{width:26%;min-width:72px;padding:5px}.art[data-side="left"],.art[data-side="right"]{width:23%}.art span{font-size:.62rem}.player{width:38px;height:50px}.dialog{left:3%;right:3%;bottom:78px;min-height:66px;padding:10px 12px;border-radius:20px}.dialog b{font-size:.94rem}.dialog span{font-size:.76rem}.controls{grid-template-columns:74px 108px 74px;gap:7px}.dpad{width:74px;height:74px}.interact,.roomBtn{height:54px;font-size:.85rem}.tabs button{font-size:.84rem}}</style></head><body><main class="game"><div class="top"><a class="brand" href="index.html">✦ Cards</a><a href="gallery.html">正式畫廊</a></div><section class="screen" id="screen"><div class="room"><div class="floorMark"></div></div><div class="hud"><div class="hudTitle"><b id="roomTitle">QQ 展廳</b><span>小人逛展測試版</span></div><div class="hudMini" id="nearText">靠近畫作</div></div><div id="arts"></div><div class="player" id="player"><div class="spark">✦</div><div class="feet"></div></div><div class="dialog"><b id="dialogTitle">操作提示</b><span id="dialogText">用方向鍵移動小人，靠近畫作後按「互動」查看大圖。</span></div><div class="controls"><div class="dpad"><button class="up" data-move="0,-1">↑</button><button class="left" data-move="-1,0">←</button><button class="center">✦</button><button class="right" data-move="1,0">→</button><button class="down" data-move="0,1">↓</button></div><button class="interact" id="interact">互動</button><button class="roomBtn" id="roomBtn">展間</button></div></section><div class="tabs" id="tabs"></div></main><script>const rooms=[{t:'QQ',d:'大頭、果凍 Q 頭、精緻 QQ 與小型可愛展示。',i:[['大頭範例','148WvO9xzn1flBJWT-TF_BoFfSKvzD7vC'],['大頭範例','1nVtWNeo0TKptNqywBjRY3keJB-NOggDW'],['果凍Q頭','17ki3cc8Lu-5IrWm5L74_1kVUjpRmP8on'],['果凍Q頭','16zo6lWZ6DHRgM0VKCDOwZE6JcAEb2X_8'],['精緻QQ','1p7gdb1as4XFpiADtHc7YzuwOuSKfWEVq'],['袋子捏捏','13zS1gdgpQa3PivqYcXvtefKRE5vCp40F']]},{t:'色塊',d:'立繪、色塊 QQ、雙人互動展示。',i:[['立繪','1xMHxsVgsaLYYqHsw4xbj3e-yCDjNXA1L'],['立繪','1KTOUVrWVTvjCXjb6Z_EQqEivw-2wRsX8'],['立繪','1d3SOYIgqFPVOTOva7Yu3rQJr8N_lnKTn'],['色塊QQ','1XzFkSexg66XJaHhfHkQ326pgxJBm0Cdt'],['雙人互動','13-QttTr4B0UlR06QHtXdk7fll57dE5Ys'],['雙人互動','1OVANULvI3yM2nvNVyYLflhC28zMJnfkz']]},{t:'亮晶晶',d:'郵票、票根、唱片、小軟糖展示。',i:[['唱片','1J92nLuEKAsSjn0cTLavjyhE1VXxsit4t'],['大頭','1zLVcc94LlsJNZMiT0wW32DHxjUoYMJ21'],['小軟糖','1bva1YIR4yGUe9ePRSjJXt-Svv599kjv_'],['票根','10WJX77Nr_jQR3ME1J3t7zmOrL2Fr6b7b'],['郵票','1fYKdP22Y8yrDgIaGbmGflbiJoDw6GCtF'],['雙人插圖','1LRiJCKf6_YvRUnYG7o_cGF448WETJe1H']]},{t:'插圖',d:'單人、雙人、塗鴉驚喜包展示。',i:[['三格驚喜包','1_-u87qDOGVooIqUIq0Q6Pe-hAUANnduY'],['單人插圖','1fSk90gXakGRYHxYUaCDT026oQgP0VGRq'],['單人插圖','1bxF2V5Mh8gq_VWfrzz4vQcD025pKetgp'],['塗鴉驚喜包','1sxMYPDvSQQEjO90KhAGJHO2GzQqojyoV'],['雙人插圖','13X_ah2_uwlUrvO-iHOCb1jsytYmWi8iG'],['雙人插圖','1wQDuHRn4Tmymy26jF4ZvDyuplt3NceZb']]},{t:'服裝角色',d:'服裝設計、角色設計與小動物訂製。',i:[['小動物訂製','11Ol7FU1YNc66olF2lhFP6DrX9mSvlYJI'],['小動物訂製','1MyaOb04CjR3FJ49CgsYk7MhKmr7ZVYpk'],['服裝設計','1JbB7OeeCJVKwOGz0wl8MdATDbAvRA5zY'],['服裝設計','1x7Z1gxhg-UADD0YDyEyQu_bDyZHsC-LR'],['服裝設計','1My9GZSAVj64LtWsWHXk4OH0lsst3q_po'],['服裝設計','16WBRdWa7WSXH_8fN62CPwzs0udVtxa2N']]},{t:'其他',d:'小物、食物、武器、瓶子與其他展示。',i:[['包漿塗鴉','19M-2vdrhEgt5VrBp9HAb0RxaBdzdb-oT'],['可麗餅','1RtG2Xxyn3oUVEFZOhG82ypkAohB_Gcr8'],['塗鴉頭','1pE5w8uCu9E3lSB8kPp8RhlO-dFCFxhVF'],['小物武器','15EqNDIWwta7oWbNveUw_CM1JmNKYv0QQ'],['小瓶子','1S1uAB_2-f9P_CBhXN7D4vyfr3_L-XMOK'],['眼睛','1JVToZdzTD_GhWdbVBk6s8qaV-b-03DVb']]}];const spots=[[28,27,'top'],[50,27,'top'],[72,27,'top'],[17,51,'left'],[83,51,'right'],[50,58,'center']];let room=0,x=50,y=69,near=0;const $=s=>document.querySelector(s),thumb=id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w1000',view=id=>'https://drive.google.com/file/d/'+id+'/view?usp=drivesdk';rooms.forEach((r,i)=>{let b=document.createElement('button');b.textContent=r.t;b.onclick=()=>setRoom(i);$('#tabs').appendChild(b)});function render(){let r=rooms[room];$('#roomTitle').textContent=r.t+' 展廳';[...$('#tabs').children].forEach((b,i)=>b.classList.toggle('on',i===room));$('#arts').innerHTML=r.i.slice(0,6).map((it,i)=>'<a class="art" data-i="'+i+'" data-side="'+spots[i][2]+'" style="left:'+spots[i][0]+'%;top:'+spots[i][1]+'%" target="_blank" rel="noopener" href="'+view(it[1])+'"><img src="'+thumb(it[1])+'" alt="'+it[0]+'"><span>'+it[0]+'</span></a>').join('');place();focusArt()}function place(){x=Math.max(14,Math.min(86,x));y=Math.max(37,Math.min(82,y));$('#player').style.setProperty('--x',x+'%');$('#player').style.setProperty('--y',y+'%')}function focusArt(){let best=999,bi=0;spots.forEach((s,i)=>{let d=Math.hypot(x-s[0],y-s[1]);if(d<best){best=d;bi=i}});near=bi;document.querySelectorAll('.art').forEach((a,i)=>a.classList.toggle('focus',i===near));let item=rooms[room].i[near];$('#dialogTitle').textContent=item?item[0]:'畫作';$('#dialogText').textContent=best<22?'按「互動」開啟這張作品大圖。':'移動小人靠近畫作，再按「互動」查看。';$('#nearText').textContent=best<22?'可互動':'靠近畫作'}function move(dx,dy){x+=dx*7;y+=dy*6;place();focusArt()}function setRoom(i){room=(i+rooms.length)%rooms.length;x=50;y=69;render()}document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>{let [dx,dy]=b.dataset.move.split(',').map(Number);move(dx,dy)});document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0);if(e.key==='Enter')interact()});function interact(){let item=rooms[room].i[near];if(item)window.open(view(item[1]),'_blank')}$('#in
