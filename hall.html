:s[1],key:s[2]+'・'+r[1],rec:s[3]})))];let room=0,pos=0,mood='迷惘';const q=s=>document.querySelector(s),thumb=id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w900';data.forEach((r,i)=>{let b=document.createElement('button');b.className='tab';b.textContent=r[0];b.onclick=()=>{room=i;pos=0;show()};q('#tabs').appendChild(b)});function show(){let items=data[room][1],it=items[pos];q('#sub').textContent=data[room][0];q('#room').textContent=data[room][0]+' 展廳';q('#step').textContent='78牌版 '+(pos+1)+'/'+items.length;q('#title').textContent=it[0];q('#desc').textContent='讀取作品中…';q('#art').src=thumb(it[1]);[...q('#tabs').children].forEach((b,i)=>b.classList.toggle('on',i===room))}q('#art').onload=()=>{let h=q('#art').naturalWidth/q('#art').naturalHeight>1.18;q('#piece').className='piece '+(h?'h':'v');q('#frame').src=h?HF:VF;q('#desc').textContent=h?'橫圖 → 橫框':'直圖/方圖 → 直框'};function mv(d){let items=data[room][1];pos=Math.max(0,Math.min(items.length-1,pos+d));show()}function tarotHTML(){return '<div class="tarot"><h3>星月占卜</h3><span class="pill">完整 '+deck.length+' 張塔羅牌庫</span><div class="box">22 張大阿爾克那＋56 張小阿爾克那。會抽出正位 / 逆位，底部推薦委託品項。</div><input id="tq" placeholder="想問什麼？"><select id="spread"><option value="1">單張牌：今日指引</option><option value="3">三張牌：現在・阻礙・建議</option><option value="5">五張牌：現況・內心・阻礙・可能・建議</option></select><div class="chips"><button class="chip on" data-m="迷惘">迷惘</button><button class="chip" data-m="想可愛">想可愛</button><button class="chip" data-m="想華麗">想華麗</button><button class="chip" data-m="整理設定">整理設定</button><button class="chip" data-m="想驚喜">想驚喜</button></div><button class="draw" id="drawTarot">洗牌・切牌・抽牌 ✦</button><div id="tarotOut"></div></div>'}function drawTarot(){let n=+q('#spread').value,lab=n===5?['現況','內心','阻礙','可能','建議']:n===3?['現在','阻礙','建議']:['今日指引'],arr=[...deck].sort(()=>Math.random()-.5).slice(0,n).map(c=>({...c,rev:Math.random()<.3}));let score={QQ:0,色塊:0,亮晶晶:0,插圖:0,服裝角色:0,委託規則:0};arr.forEach(c=>score[c.rec]+=c.rev?1:2);if(mood==='想可愛')score.QQ+=2;if(mood==='想華麗')score.亮晶晶+=2,score.插圖+=1;if(mood==='整理設定')score.服裝角色+=2;if(mood==='想驚喜')score.插圖+=2;let rec=Object.entries(score).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);q('#tarotOut').innerHTML='<div class="cards">'+arr.map((c,i)=>'<div class="card '+(c.rev?'rev':'')+'"><div><div class="no">'+String(c.no+1).padStart(2,'0')+' / 78</div><div class="sig">'+c.sig+'</div><b>'+lab[i]+'｜'+c.name+(c.rev?' 逆位':' 正位')+'</b><br><small>'+c.kind+'<br>'+c.key+'</small></div></div>').join('')+'</div><div class="box"><b>解讀</b><br>'+arr.map(c=>'【'+c.name+'】'+(c.rev?'先收斂需求。':'適合往「'+c.rec+'」方向。')).join('<br>')+'<br><br>問題：'+(q('#tq').value||'今天適合委託什麼？')+'</div><b>適合委託</b><div class="rec">'+rec.map(k=>'<a class="jump gold" href="#" data-jump="'+k+'">'+k+'</a>').join('')+'</div>';document.querySelectorAll('[data-jump]').forEach(a=>a.onclick=e=>{e.preventDefault();let i=data.findIndex(r=>r[0]===a.dataset.jump);if(i>=0){room=i;pos=0;show();q('#popBg').classList.remove('show')}else location.href='rules.html'})}const panels={占卜:['占卜區',tarotHTML],圖鑑:['圖鑑','<div class="grid">'+data.map((r,i)=>'<a class="jump" href="#" data-room="'+i+'">'+r[0]+' '+r[1].length+' 件</a>').join('')+'</div>'],郵件:['郵件箱','<div class="box">目前沒有新郵件。委託前記得確認規則、價格區間與無固定工期。</div>'],委託:['委託櫃台','<div class="box">看規則 → 準備資料與預算 → 等待確認 → 草圖確認 → 完稿後付款。</div><div class="grid"><a class="jump gold" href="rules.html">查看規則</a><a class="jump" href="queue.html">查看排單</a></div>'],商城:['商城','<div class="grid">'+data.map((r,i)=>'<a class="jump" href="#" data-room="'+i+'">'+r[0]+'</a>').join('')+'</div>'],倉庫:['倉庫','<div class="grid"><a class="jump gold" href="gallery.html">正式畫廊</a><a class="jump" href="index.html">首頁卡牌</a><a class="jump" href="rules.html">規則頁</a><a class="jump" href="queue.html">排單頁</a></div>']};function openP(name){let p=panels[name];q('#popTitle').textContent=p[0];q('#popBody').innerHTML=typeof p[1]==='function'?p[1]():p[1];q('#popBg').classList.add('show');document.querySelectorAll('[data-room]').forEach(a=>a.onclick=e=
