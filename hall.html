<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>2D 平面畫廊測試頁</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:#070814;color:#fff6df;font-family:'Noto Serif TC',serif;overflow:hidden}.game{height:100dvh;padding:8px;background:radial-gradient(circle at 50% 0,#484c75,#151831 45%,#050611)}.top{height:42px;display:flex;justify-content:space-between;align-items:center;gap:8px;width:min(1040px,100%);margin:auto}.top a{color:#f1d98e;text-decoration:none;border:1px solid rgba(239,216,142,.28);border-radius:999px;background:rgba(0,0,0,.25);padding:8px 11px;font-size:.84rem}.brand{font-family:Cinzel,serif;letter-spacing:.08em}.screen{position:relative;width:min(1040px,100%);height:calc(100dvh - 112px);min-height:540px;margin:auto;border:1px solid rgba(239,216,142,.35);border-radius:28px;overflow:hidden;background:linear-gradient(180deg,rgba(7,8,22,.42),rgba(7,8,22,.72)),url('https://drive.google.com/thumbnail?id=15tN2XzOZEtrjLNhHA54bzMYWSuCZZ6f8&sz=w1800') center/cover no-repeat,linear-gradient(180deg,#242850,#090a18);box-shadow:0 34px 72px rgba(0,0,0,.5)}.screen:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 22%,rgba(0,0,0,.38) 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),inset 0 -80px 80px rgba(0,0,0,.4)}.wall{position:absolute;left:4%;right:4%;top:12%;bottom:22%;border:1px solid rgba(239,216,142,.25);border-radius:26px;background:linear-gradient(180deg,rgba(25,28,58,.9),rgba(10,11,28,.88));box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 18px 44px rgba(0,0,0,.34)}.wall:before{content:"";position:absolute;left:0;right:0;top:0;height:38px;border-radius:26px 26px 0 0;background:linear-gradient(90deg,rgba(239,216,142,.08),rgba(255,255,255,.08),rgba(239,216,142,.08))}.floor{position:absolute;left:0;right:0;bottom:0;height:28%;background:linear-gradient(180deg,rgba(12,13,30,.2),rgba(5,5,12,.78))}.hud{position:absolute;left:16px;right:16px;top:14px;z-index:40;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.hudTitle{border:1px solid rgba(239,216,142,.28);border-radius:18px;background:rgba(3,5,17,.66);padding:9px 11px;backdrop-filter:blur(8px)}.hudTitle b{display:block;color:#fff3bf;font-size:1.08rem}.hudTitle span{color:rgba(255,246,223,.72);font-size:.78rem}.hudMini{border:1px solid rgba(239,216,142,.26);border-radius:999px;background:rgba(3,5,17,.62);padding:9px 12px;color:#e8d79e;height:max-content}.grid{position:absolute;z-index:12;left:7%;right:7%;top:23%;bottom:30%;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{position:relative;display:block;text-decoration:none;color:#fff6df;border:1px solid rgba(239,216,142,.26);border-radius:20px;background:rgba(5,7,20,.45);padding:8px;box-shadow:0 16px 30px rgba(0,0,0,.35);transition:transform .18s ease,filter .18s ease}.card:hover{transform:translateY(-3px);filter:drop-shadow(0 0 16px rgba(239,216,142,.22))}.card img{display:block;width:100%;height:calc(100% - 28px);object-fit:contain;background:rgba(255,255,255,.96);border:6px solid #d8bd73;border-radius:12px}.card span{display:block;text-align:center;margin-top:6px;font-size:.78rem;color:rgba(255,246,223,.86);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dialog{position:absolute;left:4%;right:4%;bottom:76px;z-index:34;border:1px solid rgba(239,216,142,.3);border-radius:22px;background:rgba(4,6,18,.72);backdrop-filter:blur(10px);padding:13px 15px;min-height:72px;box-shadow:0 18px 38px rgba(0,0,0,.34)}.dialog b{display:block;color:#fff3bf;font-size:1.05rem;margin-bottom:4px}.dialog span{color:rgba(255,2 tion class="screen" id="screen"><div class="wall"></div><div class="floor"></div><div class="hud"><div class="hudTitle"><b id="roomTitle">QQ</b><span>2D 平面測試版</span></div><div class="hudMini" id="count">第 1 面牆</div></div><div class="grid" id="grid"></div><div class="dialog"><b id="dialogTitle">畫廊展牆</b><span id="dialogText">改成平面遊戲式展示：一面牆放四張，按下一面牆會固定往後，不隨機。</span></div><div class="pad"><button id="prevBtn">← 上一面</button><button class="forward" id="nextBtn">下一面 →</button><button id="roomBtn">展間</button></div></section><div class="tabs" id="tabs"></div></main><script>const rooms=[{t:'QQ',d:'大頭、果凍 Q 頭、精緻 QQ 與小型可愛展示。',i:[['大頭範例','148WvO9xzn1flBJWT-TF_BoFfSKvzD7vC'],['大頭範例','1nVtWNeo0TKptNqywBjRY3keJB-NOggDW'],['果凍Q頭','17ki3cc8Lu-5IrWm5L74_1kVUjpRmP8on'],['果凍Q頭','16zo6lWZ6DHRgM0VKCDOwZE6JcAEb2X_8'],['精緻QQ','1p7gdb1as4XFpiADtHc7YzuwOuSKfWEVq'],['精緻QQ','1ZKnW4thWQizrBaAQ0QEn1ZrGoBaHc9ob'],['蝴蝶結坐坐','1tSCDzA9cafdiQZ13pWD2Kt-yYOngLsUl'],['袋子捏捏','13zS1gdgpQa3PivqYcXvtefKRE5vCp40F']]},{t:'色塊',d:'立繪、色塊 QQ、雙人互動展示。',i:[['立繪','1xMHxsVgsaLYYqHsw4xbj3e-yCDjNXA1L'],['立繪','1KTOUVrWVTvjCXjb6Z_EQqEivw-2wRsX8'],['立繪','1d3SOYIgqFPVOTOva7Yu3rQJr8N_lnKTn'],['色塊QQ','1XzFkSexg66XJaHhfHkQ326pgxJBm0Cdt'],['雙人互動','13-QttTr4B0UlR06QHtXdk7fll57dE5Ys'],['雙人互動','1OVANULvI3yM2nvNVyYLflhC28zMJnfkz']]},{t:'亮晶晶',d:'郵票、票根、唱片、小軟糖展示。',i:[['唱片','1J92nLuEKAsSjn0cTLavjyhE1VXxsit4t'],['大頭','1zLVcc94LlsJNZMiT0wW32DHxjUoYMJ21'],['小軟糖','1bva1YIR4yGUe9ePRSjJXt-Svv599kjv_'],['票根','10WJX77Nr_jQR3ME1J3t7zmOrL2Fr6b7b'],['郵票','1fYKdP22Y8yrDgIaGbmGflbiJoDw6GCtF'],['雙人插圖','1LRiJCKf6_YvRUnYG7o_cGF448WETJe1H']]},{t:'插圖',d:'單人、雙人、塗鴉驚喜包展示。',i:[['三格驚喜包','1_-u87qDOGVooIqUIq0Q6Pe-hAUANnduY'],['單人插圖','1fSk90gXakGRYHxYUaCDT026oQgP0VGRq'],['單人插圖','1bxF2V5Mh8gq_VWfrzz4vQcD025pKetgp'],['塗鴉驚喜包','1sxMYPDvSQQEjO90KhAGJHO2GzQqojyoV'],['雙人插圖','13X_ah2_uwlUrvO-iHOCb1jsytYmWi8iG'],['雙人插圖','1wQDuHRn4Tmymy26jF4ZvDyuplt3NceZb']]},{t:'服裝角色',d:'服裝設計、角色設計與小動物訂製。',i:[['小動物訂製','11Ol7FU1YNc66olF2lhFP6DrX9mSvlYJI'],['小動物訂製','1MyaOb04CjR3FJ49CgsYk7MhKmr
