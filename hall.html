=[{t:'QQ',d:'大頭、果凍 Q 頭、精緻 QQ 與小型可愛展示。',i:[['大頭範例','148WvO9xzn1flBJWT-TF_BoFfSKvzD7vC'],['大頭範例','1nVtWNeo0TKptNqywBjRY3keJB-NOggDW'],['果凍Q頭','17ki3cc8Lu-5IrWm5L74_1kVUjpRmP8on'],['果凍Q頭','16zo6lWZ6DHRgM0VKCDOwZE6JcAEb2X_8'],['精緻QQ','1p7gdb1as4XFpiADtHc7YzuwOuSKfWEVq'],['袋子捏捏','13zS1gdgpQa3PivqYcXvtefKRE5vCp40F']]},{t:'色塊',d:'立繪、色塊 QQ、雙人互動展示。',i:[['立繪','1xMHxsVgsaLYYqHsw4xbj3e-yCDjNXA1L'],['立繪','1KTOUVrWVTvjCXjb6Z_EQqEivw-2wRsX8'],['立繪','1d3SOYIgqFPVOTOva7Yu3rQJr8N_lnKTn'],['色塊QQ','1XzFkSexg66XJaHhfHkQ326pgxJBm0Cdt'],['雙人互動','13-QttTr4B0UlR06QHtXdk7fll57dE5Ys'],['雙人互動','1OVANULvI3yM2nvNVyYLflhC28zMJnfkz']]},{t:'亮晶晶',d:'郵票、票根、唱片、小軟糖展示。',i:[['唱片','1J92nLuEKAsSjn0cTLavjyhE1VXxsit4t'],['大頭','1zLVcc94LlsJNZMiT0wW32DHxjUoYMJ21'],['小軟糖','1bva1YIR4yGUe9ePRSjJXt-Svv599kjv_'],['票根','10WJX77Nr_jQR3ME1J3t7zmOrL2Fr6b7b'],['郵票','1fYKdP22Y8yrDgIaGbmGflbiJoDw6GCtF'],['雙人插圖','1LRiJCKf6_YvRUnYG7o_cGF448WETJe1H']]},{t:'插圖',d:'單人、雙人、塗鴉驚喜包展示。',i:[['三格驚喜包','1_-u87qDOGVooIqUIq0Q6Pe-hAUANnduY'],['單人插圖','1fSk90gXakGRYHxYUaCDT026oQgP0VGRq'],['單人插圖','1bxF2V5Mh8gq_VWfrzz4vQcD025pKetgp'],['塗鴉驚喜包','1sxMYPDvSQQEjO90KhAGJHO2GzQqojyoV'],['雙人插圖','13X_ah2_uwlUrvO-iHOCb1jsytYmWi8iG'],['雙人插圖','1wQDuHRn4Tmymy26jF4ZvDyuplt3NceZb']]},{t:'服裝角色',d:'服裝設計、角色設計與小動物訂製。',i:[['小動物訂製','11Ol7FU1YNc66olF2lhFP6DrX9mSvlYJI'],['小動物訂製','1MyaOb04CjR3FJ49CgsYk7MhKmr7ZVYpk'],['服裝設計','1JbB7OeeCJVKwOGz0wl8MdATDbAvRA5zY'],['服裝設計','1x7Z1gxhg-UADD0YDyEyQu_bDyZHsC-LR'],['服裝設計','1My9GZSAVj64LtWsWHXk4OH0lsst3q_po'],['服裝設計','16WBRdWa7WSXH_8fN62CPwzs0udVtxa2N']]},{t:'其他',d:'小物、食物、武器、瓶子與其他展示。',i:[['包漿塗鴉','19M-2vdrhEgt5VrBp9HAb0RxaBdzdb-oT'],['可麗餅','1RtG2Xxyn3oUVEFZOhG82ypkAohB_Gcr8'],['塗鴉頭','1pE5w8uCu9E3lSB8kPp8RhlO-dFCFxhVF'],['小物武器','15EqNDIWwta7oWbNveUw_CM1JmNKYv0QQ'],['小瓶子','1S1uAB_2-f9P_CBhXN7D4vyfr3_L-XMOK'],['眼睛','1JVToZdzTD_GhWdbVBk6s8qaV-b-03DVb']]}];const spots=[[25,20],[50,20],[75,20],[25,48],[75,48],[50,70]];let room=0,x=50,y=58,near=0;const $=s=>document.querySelector(s),thumb=id=>'https://drive.google.com/thumbnail?id='+id
