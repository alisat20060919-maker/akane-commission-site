<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>沉浸式畫廊測試頁</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:#070814;color:#fff6df;font-family:'Noto Serif TC',serif;overflow-x:hidden}.game{min-height:100dvh;padding:12px 12px 18px;background:radial-gradient(circle at 50% 0,#4b4f78 0,#171a35 42%,#060714 100%)}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 auto 10px;width:min(1020px,100%);font-size:.9rem}.top a{color:#f1d98e;text-decoration:none;border:1px solid rgba(239,216,142,.28);border-radius:999px;background:rgba(0,0,0,.25);padding:8px 11px}.brand{font-family:Cinzel,serif;letter-spacing:.08em}.screen{position:relative;width:min(1020px,100%);height:min(76dvh,720px);min-height:560px;margin:auto;border:1px solid rgba(239,216,142,.35);border-radius:30px;overflow:hidden;background:linear-gradient(180deg,#232750,#090a18);box-shadow:0 34px 72px rgba(0,0,0,.5)}.hud{position:absolute;left:14px;right:14px;top:12px;z-index:30;display:flex;justify-content:space-between;align-items:start;gap:10px;pointer-events:none}.hudTitle{border:1px solid rgba(239,216,142,.28);border-radius:18px;background:rgba(3,5,17,.66);padding:10px 12px;backdrop-filter:blur(6px)}.hudTitle b{display:block;color:#fff3bf;font-size:1.15rem}.hudTitle span{color:rgba(255,246,223,.72);font-size:.82rem}.hudMini{border:1px solid rgba(239,216,142,.26);border-radius:999px;background:rgba(3,5,17,.62);padding:9px 12px;color:#e8d79e}.room{position:absolute;inset:0}.roof{position:absolute;inset:0 0 auto;height:28%;clip-path:polygon(0 0,100% 0,60% 100%,40% 100%);background:linear-gradient(180deg,#484c79,#171a35)}.roof:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 12%,rgba(239,216,142,.1) 12.4%,transparent 12.9%)}.wallL{position:absolute;inset:0;clip-path:polygon(0 0,40% 28%,40% 73%,0 100%);background:linear-gradient(90deg,#0d0f22,#252b51 62%,#13162e)}.wallR{position:absolute;inset:0;clip-path:polygon(100% 0,60% 28%,60% 73%,100% 100%);background:linear-gradient(270deg,#0d0f22,#252b51 62%,#13162e)}.back{position:absolute;left:40%;right:40%;top:28%;bottom:27%;background:radial-gradient(circle,rgba(133,106,205,.5),rgba(14,14,31,.98));border:1px solid rgba(239,216,142,.16)}.floor{position:absolute;inset:auto 0 0;height:43%;clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);background:linear-gradient(180deg,#171627,#04050b)}.floor:after{content:"";position:absolute;inset:0;background:linear-gradient(82deg,transparent 0 20%,rgba(239,216,142,.13) 20.4%,transparent 21%,transparent 39%,rgba(239,216,142,.11) 39.4%,transparent 40%,transparent 60%,rgba(239,216,142,.11) 60.4%,transparent 61%,transparent 79%,rgba(239,216,142,.13) 79.4%,transparent 80%),repeating-linear-gradient(180deg,transparent 0 52px,rgba(239,216,142,.1) 53px,transparent 55px)}.carpet{position:absolute;left:0;right:0;bottom:0;height:43%;clip-path:polygon(44% 0,56% 0,76% 100%,24% 100%);background:linear-gradient(180deg,#bd4b72,#5a1231);box-shadow:inset 0 0 0 1px rgba(255,233,160,.13)}.pic{position:absolute;z-index:8;text-decoration:none;color:#fff6df;filter:drop-shadow(0 18px 18px rgba(0,0,0,.42));transition:left .38s ease,right .38s ease,top .38s ease,width .38s ease,opacity .38s ease,transform .38s ease}.pic img{display:block;width:100%;aspect-ratio:4/5;object-fit:contain;background:#fff;border:7px solid #d8bd73;border-radius:7px;box-shadow:0 0 0 2px rgba(58,34,10,.72) inset}.pic span{display:block;text-align:center;color:rgba(255,246,223,.84);font-size:.8rem;margin-top:5px;text-shadow:0 2px 10px #000}.pic.left img{clip-path:polygon(14% 0,100% 7%,100% 93%,14% 100%,0 88%,0 12%)}.pic.right img{clip-path:polygon(0 7%,86% 0,100% 12%,100% 88%,86% 100%,0 93%)}.front.left{left:-5%;top:32%;width:250px;transform:perspective(900px) rotateY(45deg)}.front.right{right:-5%;top:32%;width:250px;transform:perspective(900px) rotateY(-45deg)}.middle.left{left:19%;top:34%;width:130px;transform:perspective(900px) rotateY(36deg)}.middle.right{right:19%;top:34%;width:130px;transform:perspective(900px) rotateY(-36deg)}.backrow.left{left:35%;top:37%;width:62px;transform:perspective(900px) rotateY(25deg)}.backrow.right{right:35%;top:37%;width:62px;transform:perspective(900px) rotateY(-25deg)}.move .front{opacity:0;transform:translateY(90px) scale(1.35)}.move .middle{filter:drop-shadow(0 0 22px rgba(239,216,142,.35))}.hot{position:absolute;z-index:24;border:1px solid rgba(239,216,142,.42);background:rgba(5,7,20,.62);color:#f5df9a;border-radius:999px;font-weight:900;font-family:inherit;backdrop-filter:blur(8px)}.leftDoor{left:14px;top:50%;padding:12px 14px}.rightDoor{right:14px;top:50%;padding:12px 14px}.pad{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:28;display:grid;grid-template-columns:74px 94px 74px;gap:8px;align-items:center;border:1px solid rgba(239,216,142,.26);border-radius:28px;background:rgba(5,7,20,.62);padding:9px;backdrop-filter:blur(10px)}.pad button{border:1px solid rgba(239,216,142,.36);border-radius:20px;background:rgba(255,255,255,.07);color:#fff6df;font:900 .92rem 'Noto Serif TC',serif;padding:11px 8px}.pad .forward{background:#efd98d;color:#171329;font-size:1.05rem}.tabs{width:min(1020px,100%);margin:12px auto 0;display:flex;gap:8px;overflow:auto;padding-bottom:4px}.tabs button{flex:0 0 auto;border:1px solid rgba(239,216,142,.34);border-radius:999px;background:rgba(255,255,255,.07);color:#fff6df;padding:10px 14px;font:900 .95rem 'Noto Serif TC',serif}.tabs button.on{background:#efd98d;color:#171329}.note{width:min(1020px,100%);margin:9px auto 0;color:rgba(255,246,223,.55);font-size:.82rem;line-height:1.5;text-align:center}@media(max-width:700px){.game{padding:8px 8px 14px}.top{font-size:.82rem}.screen{height:72dvh;min-height:540px;border-radius:25px}.hud{left:10px;right:10px;top:10px}.hudTitle{padding:8px 10px}.hudTitle b{font-size:1rem}.hudMini{font-size:.78rem;padding:8px 10px}.front.left,.front.right{width:146px;top:34%}.front.left{left:-12%}.front.right{right:-12%}.middle.left,.middle.right{width:86px;top:36%}.middle.left{left:17%}.middle.right{right:17%}.backrow.left,.backrow.right{width:48px;top:39%}.backrow.left{left:35%}.backrow.right{right:35%}.pic img{border-width:5px}.pic span{font-size:.64rem}.leftDoor,.rightDoor{top:51%;font-size:.75rem;padding:9px 10px}.pad{grid-template-columns:66px 86px 66px;bottom:12px;border-radius:24px}.pad button{padding:10px 6px}.carpet{clip-path:polygon(42% 0,58% 0,82% 100%,18% 100%)}}</style></head><body><main class="game"><div class="top"><a class="brand" href="index.html">✦ Cards</a><a href="gallery.html">正式畫廊</a></div><section class="screen" id="screen"><div class="room"><div class="roof"></div><div class="wallL"></div><div class="wallR"></div><div class="back"></div><div class="floor"></div><div class="carpet"></div></div><div class="hud"><div class="hudTitle"><b id="roomTitle">QQ</b><span id="roomDesc">固定排序前進，不隨機</span></div><div class="hudMini" id="count">第 1 段</div></div><button class="hot leftDoor" id="leftDoor">← 左</button><button class="hot rightDoor" id="rightDoor">右 →</button><a class="pic front left" id="p0" target="_blank" rel="noopener"><img><span></span></a><a class="pic front right" id="p1" target="_blank" rel="noopener"><img><span></span></a><a class="pic middle left" id="p2" target="_blank" rel="noopener"><img><span></span></a><a class="pic middle right" id="p3" target="_blank" rel="noopener"><img><span></span></a><a class="pic backrow left" id="p4" target="_blank" rel="noopener"><img><span></span></a><a class="pic backrow right" id="p5" target="_blank" rel="noopener"><img><span></span></a><div class="pad"><button id="backBtn">← 後退</button><button class="forward" id="go">↑ 前進</button><button id="mapBtn">展間</button></div></section><div class="tabs" id="tabs"></div><p class="note">遊戲測試版：↑ 前進後，中排會變前排，遠排會變中排，新作品補到遠排。</p></main><script>const rooms=[{t:'QQ',d:'可愛頭像與 QQ 展示。',i:[['大頭範例','148WvO9xzn1flBJWT-TF_BoFfSKvzD7vC'],['大頭範例','1nVtWNeo0TKptNqywBjRY3keJB-NOggDW'],['果凍Q頭','17ki3cc8Lu-5IrWm5L74_1kVUjpRmP8on'],['果凍Q頭','16zo6lWZ6DHRgM0VKCDOwZE6JcAEb2X_8'],['精緻QQ','1p7gdb1as4XFpiADtHc7YzuwOuSKfWEVq'],['精緻QQ','1ZKnW4thWQizrBaAQ0QEn1ZrGoBaHc9ob'],['蝴蝶結坐坐','1tSCDzA9cafdiQZ13pWD2Kt-yYOngLsUl'],['袋子捏捏','13zS1gdgpQa3PivqYcXvtefKRE5vCp40F']]},{t:'色塊',d:'立繪與雙人互動。',i:[['立繪','1xMHxsVgsaLYYqHsw4xbj3e-yCDjNXA1L'],['立繪','1KTOUVrWVTvjCXjb6Z_EQqEivw-2wRsX8'],['立繪','1d3SOYIgqFPVOTOva7Yu3rQJr8N_lnKTn'],['色塊QQ','1XzFkSexg66XJaHhfHkQ326pgxJBm0Cdt'],['雙人互動','13-QttTr4B0UlR06QHtXdk7fll57dE5Ys'],['雙人互動','1OVANULvI3yM2nvNVyYLflhC28zMJnfkz']]},{t:'亮晶晶',d:'郵票、票根、唱片、小軟糖。',i:[['唱片','1J92nLuEKAsSjn0cTLavjyhE1VXxsit4t'],['大頭','1zLVcc94LlsJNZMiT0wW32DHxjUoYMJ21'],['小軟糖','1bva1YIR4yGUe9ePRSjJXt-Svv599kjv_'],['票根','10WJX77Nr_jQR3ME1J3t7zmOrL2Fr6b7b'],['郵票','1fYKdP22Y8yrDgIaGbmGflbiJoDw6GCtF'],['雙人插圖','1LRiJCKf6_YvRUnYG7o_cGF448WETJe1H']]},{t:'插圖',d:'單人、雙人與驚喜包。',i:[['三格驚喜包','1_-u87qDOGVooIqUIq0Q6Pe-hAUANnduY'],['單人插圖','1fSk90gXakGRYHxYUaCDT026oQgP0VGRq'],['單人插圖','1bxF2V5Mh8gq_VWfrzz4vQcD025pKetgp'],['塗鴉驚喜包','1sxMYPDvSQQEjO90KhAGJHO2GzQqojyoV'],['雙人插圖','13X_ah2_uwlUrvO-iHOCb1jsytYmWi8iG'],['雙人插圖','1wQDuHRn4Tmymy26jF4ZvDyuplt3NceZb']]},{t:'服裝角色',d:'服裝設計與角色訂製。',i:[['小動物訂製','11Ol7FU1YNc66olF2lhFP6DrX9mSvlYJI'],['小動物訂製','1MyaOb04CjR3FJ49CgsYk7MhKmr7ZVYpk'],['服裝設計','1JbB7OeeCJVKwOGz0wl8MdATDbAvRA5zY'],['服裝設計','1x7Z1gxhg-UADD0YDyEyQu_bDyZHsC-LR'],['服裝設計','1My9GZSAVj64LtWsWHXk4OH0lsst3q_po'],['服裝設計','16WBRdWa7WSXH_8fN62CPwzs0udVtxa2N']]},{t:'其他',d:'小物、食物、武器與其他。',i:[['包漿塗鴉','19M-2vdrhEgt5VrBp9HAb0RxaBdzdb-oT'],['可麗餅','1RtG2Xxyn3oUVEFZOhG82ypkAohB_Gcr8'],['塗鴉頭','1pE5w8uCu9E3lSB8kPp8RhlO-dFCFxh
